name: Backend CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore Cleansia.Api.sln
        working-directory: ./src

      - name: Build Partner API
        run: dotnet build Cleansia.Web/Cleansia.Web.csproj --configuration Release --no-restore
        working-directory: ./src

      - name: Build Admin API
        run: dotnet build Cleansia.Web.Admin/Cleansia.Web.Admin.csproj --configuration Release --no-restore
        working-directory: ./src

      - name: Run tests
        run: dotnet test --configuration Release --no-build
        working-directory: ./src
