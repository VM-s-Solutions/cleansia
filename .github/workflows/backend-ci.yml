name: Backend CI

# Also runs on pushes to master: direct-to-master commits used to bypass this gate
# entirely (pull_request-only), which is how the stale ConfirmUserEmail integration
# tests rode in red and unnoticed until the next PR surfaced them.
# Paths-scoped to the backend trees: the frontend (Cleansia.App), Android and iOS
# trees have their own CIs, so their changes must not spin the full Testcontainers
# suite here. The sln + Directory.Packages.props live under src/, so 'src/**'
# covers them.
on:
  pull_request:
    branches:
      - '*'
    paths:
      - 'src/**'
      - '!src/Cleansia.App/**'
      - '!src/cleansia_android/**'
      - '!src/cleansia_ios/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '!src/Cleansia.App/**'
      - '!src/cleansia_android/**'
      - '!src/cleansia_ios/**'
      - '.github/workflows/backend-ci.yml'

# A newer push to the same ref supersedes the in-flight run — the container-backed
# suites are the long pole, and stacked runs only burn runner minutes on stale SHAs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      # NuGet package cache — keyed on the central package versions file + csprojs, so a
      # dependency bump misses once and everything else restores from cache instead of nuget.org.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/Directory.Packages.props', 'src/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Cleansia.Api.sln
        working-directory: ./src

      - name: Build solution
        run: dotnet build Cleansia.Api.sln --configuration Release --no-restore
        working-directory: ./src

      # Fast unit tests first so the pipeline fails quickly on a logic regression
      # without waiting on the container-backed suites below.
      - name: Unit tests (Cleansia.Tests)
        run: >-
          dotnet test Cleansia.Tests/Cleansia.Tests.csproj
          --configuration Release --no-build --verbosity normal
          -- xUnit.parallelizeTestCollections=false
        working-directory: ./src

      # Integration + host tests spin a real Postgres via Testcontainers (Docker is
      # available on ubuntu-latest). These are the suites that catch the multi-tenant /
      # FK / migration / webhook bugs that unit tests (SQLite/mocked) cannot. Run
      # single-threaded — the metrics MeterListener and the shared Postgres container
      # are sensitive to collection-parallel runs.
      - name: Integration tests (real Postgres)
        run: >-
          dotnet test Cleansia.IntegrationTests/Cleansia.IntegrationTests.csproj
          --configuration Release --no-build --verbosity normal
          -- xUnit.parallelizeTestCollections=false
        working-directory: ./src

      - name: Host tests (authz/isolation, real Postgres)
        run: >-
          dotnet test Cleansia.HostTests/Cleansia.HostTests.csproj
          --configuration Release --no-build --verbosity normal
          -- xUnit.parallelizeTestCollections=false
        working-directory: ./src
