name: Backend CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore Cleansia.Api.sln
        working-directory: ./src

      - name: Build solution
        run: dotnet build Cleansia.Api.sln --configuration Release --no-restore
        working-directory: ./src

      - name: Run tests
        run: dotnet test Cleansia.Api.sln --configuration Release --no-build --verbosity normal
        working-directory: ./src
