name: Deploy to Azure (reusable)

# The SINGLE deploy pipeline (ADR-0015 + ADR-0017), shared by both stages so dev and prod cannot
# drift. It has NO trigger of its own — a reusable workflow cannot have a push trigger — and is
# invoked only via `workflow_call` by the two thin callers:
#
#   deploy-dev.yml  ─▶ env=dev,  githubEnvironment=dev-weu,  bicepparamFile=deploy/bicep/weu.dev.bicepparam
#   deploy-pro.yml  ─▶ env=prod, githubEnvironment=prod-weu, bicepparamFile=deploy/bicep/weu.prod.bicepparam
#
# Flow per region (region is a one-element matrix — [inputs.region] — so a second region is one more
# matrix entry in the caller-fed input, never a workflow restructure; ADR-0017 D5):
#   build-dotnet / build-angular  ──▶  provision (Bicep)  ──┐
#                                      migrate-database  ───┴─▶  deploy 5 APIs + SSR + Functions + 2 SPAs
#
# - `mode` is resolved by the CALLER (push → deploy; dispatch → the chosen input) and passed in;
#   every gated job reads `inputs.mode`. `what-if` is a non-mutating Bicep preview: no secret push,
#   no migrations, no deploys.
# - Every resource name is the Bicep-derived `<type>-cleansia[-<audience>]-<region>-<env>` scheme,
#   driven by `inputs.env` + `matrix.region` — no stage name is hardcoded in any job.
# - Every job that reads per-stage secrets sets `environment: inputs.githubEnvironment`, so with
#   `secrets: inherit` the caller's GitHub Environment (dev-weu open, prod-weu reviewer-protected)
#   supplies both the secret VALUES and the protection gate. Secrets are referenced by NAME only;
#   no secret value is in this file (ADR-0015 D4).
# - OIDC (azure/login@v2 + id-token: write) and the EF-migration bundle (committed migrations applied
#   BEFORE any API deploy) are preserved (ADR-0015 D5).
# - On B2 the app deploys fan out: every API/SSR/Functions deploy depends on [provision, migrate-database]
#   only, not on each other. The ordering that matters (migrate-before-deploy) is held by the needs edge.
# - All FIVE API hosts are deployed, including api-cleansia-customer-mobile-<region>-<env> (the host the
#   old four-host YAML omitted — the iOS customer app's API).

on:
  workflow_call:
    inputs:
      env:
        description: "Stage token in every resource name: 'dev' or 'prod'"
        type: string
        required: true
      githubEnvironment:
        description: "GitHub Environment holding the per-stage secrets (and, for prod, the required-reviewers gate): 'dev-weu' or 'prod-weu'"
        type: string
        required: true
      mode:
        description: "'deploy' = provision + migrate + deploy all hosts; 'what-if' = non-mutating Bicep preview only"
        type: string
        required: true
      region:
        description: "Azure region token (ADR-0017) — the single matrix leg"
        type: string
        required: false
        default: weu
      bicepparamFile:
        description: "Repo-relative path to the stage's .bicepparam file"
        type: string
        required: true

jobs:
  # ===========================================================================================
  # Build — produce the deployable artifacts (no Azure access needed)
  # ===========================================================================================

  build-dotnet:
    name: Build .NET APIs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore Cleansia.Api.sln
        working-directory: ./src

      - name: Build solution
        run: dotnet build Cleansia.Api.sln --configuration Release --no-restore
        working-directory: ./src

      # Deploy-gate = the FAST unit suite only (Cleansia.Tests). The container-backed
      # IntegrationTests/HostTests (real Postgres via Testcontainers) are the PR gate in
      # backend-ci.yml — running the whole solution here fails because those suites need a
      # Postgres container that this publish job doesn't start, and re-running them on every
      # manual deploy is needless. A logic regression still blocks the deploy via this gate.
      - name: Unit tests (Cleansia.Tests)
        run: >-
          dotnet test Cleansia.Tests/Cleansia.Tests.csproj
          --configuration Release --no-build --verbosity normal
          -- xUnit.parallelizeTestCollections=false
        working-directory: ./src

      - name: Publish Partner API
        run: dotnet publish Cleansia.Web.Partner/Cleansia.Web.Partner.csproj --configuration Release --no-restore --output ./publish/partner-api
        working-directory: ./src

      - name: Publish Admin API
        run: dotnet publish Cleansia.Web.Admin/Cleansia.Web.Admin.csproj --configuration Release --no-restore --output ./publish/admin-api
        working-directory: ./src

      - name: Publish Customer API
        run: dotnet publish Cleansia.Web.Customer/Cleansia.Web.Customer.csproj --configuration Release --no-restore --output ./publish/customer-api
        working-directory: ./src

      - name: Publish Partner-Mobile API
        run: dotnet publish Cleansia.Web.Mobile.Partner/Cleansia.Web.Mobile.Partner.csproj --configuration Release --no-restore --output ./publish/partner-mobile-api
        working-directory: ./src

      - name: Publish Customer-Mobile API
        run: dotnet publish Cleansia.Web.Mobile.Customer/Cleansia.Web.Mobile.Customer.csproj --configuration Release --no-restore --output ./publish/customer-mobile-api
        working-directory: ./src

      - name: Upload Partner API artifact
        uses: actions/upload-artifact@v4
        with:
          name: partner-api
          path: ./src/publish/partner-api

      - name: Upload Admin API artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-api
          path: ./src/publish/admin-api

      - name: Upload Customer API artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-api
          path: ./src/publish/customer-api

      - name: Upload Partner-Mobile API artifact
        uses: actions/upload-artifact@v4
        with:
          name: partner-mobile-api
          path: ./src/publish/partner-mobile-api

      - name: Upload Customer-Mobile API artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-mobile-api
          path: ./src/publish/customer-mobile-api

  build-angular:
    name: Build Angular Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # dev deploys the `staging` nx configuration; prod deploys `production`. Both exist in all
      # three apps' project.json — this is the only build knob that differs per stage.
      NX_BUILD_CONFIGURATION: ${{ inputs.env == 'prod' && 'production' || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./src/Cleansia.App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./src/Cleansia.App

      - name: Build Customer App
        run: npx nx build cleansia.app --configuration=$NX_BUILD_CONFIGURATION --skip-nx-cache
        working-directory: ./src/Cleansia.App

      - name: Build Partner App
        run: npx nx build cleansia-partner.app --configuration=$NX_BUILD_CONFIGURATION --skip-nx-cache
        working-directory: ./src/Cleansia.App

      - name: Build Admin App
        run: npx nx build cleansia-admin.app --configuration=$NX_BUILD_CONFIGURATION --skip-nx-cache
        working-directory: ./src/Cleansia.App

      - name: Prepare Customer SSR package.json
        run: |
          echo '{"name":"cleansia-customer-ssr","version":"1.0.0","type":"module","scripts":{"start":"node server/server.mjs"}}' \
            > ./src/Cleansia.App/dist/apps/cleansia.app/package.json

      - name: Upload Customer App artifact (SSR)
        uses: actions/upload-artifact@v4
        with:
          name: customer-app
          path: ./src/Cleansia.App/dist/apps/cleansia.app

      - name: Upload Partner App artifact
        uses: actions/upload-artifact@v4
        with:
          name: partner-app
          path: ./src/Cleansia.App/dist/apps/cleansia-partner.app/browser

      - name: Upload Admin App artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app
          path: ./src/Cleansia.App/dist/apps/cleansia-admin.app/browser

  # ===========================================================================================
  # Provision — Bicep gate (ADR-0015 D5). what-if previews, deploy creates/updates.
  # Region matrix (ADR-0017 D5): one leg today ([inputs.region]).
  # ===========================================================================================

  provision:
    name: Provision (Bicep)
    needs: [build-dotnet, build-angular]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # fcmSecretProvisioned tracks whether the FIREBASE_SERVICE_ACCOUNT_JSON GitHub secret is set for
      # this Environment. The secret-push step below writes Fcm--ServiceAccountJson to Key Vault in the
      # SAME run, so deriving the Bicep param from the secret's PRESENCE (known here, before both steps)
      # keeps provisioning and the secret write consistent — the KV reference is wired iff the secret is
      # about to exist, never before. Set the secret once per Environment to enable iOS/Android push.
      - name: Resolve FCM provisioning flag
        # The secret MUST come in via env, never inlined as ${{ secrets.* }} into the script body:
        # the service-account value is multiline JSON, and GitHub substitutes it as literal text before
        # the shell runs, so an inlined `[ -n "${{ secrets.X }}" ]` splits across the embedded newlines
        # and the JSON's quotes collide with the test's — the condition never evaluates true and the
        # Function App silently never receives FCM__ServiceAccountJson. Reading a quoted env var is safe.
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FCM_PROVISIONED=true" >> "$GITHUB_ENV"
          else
            echo "FCM_PROVISIONED=false" >> "$GITHUB_ENV"
          fi

      - name: Bicep what-if (non-mutating preview)
        if: inputs.mode == 'what-if'
        run: |
          az deployment group what-if \
            --resource-group rg-cleansia-${{ matrix.region }}-${{ inputs.env }} \
            --template-file deploy/bicep/main.bicep \
            --parameters ${{ inputs.bicepparamFile }} \
            --parameters postgresAdministratorPassword="$POSTGRES_ADMIN_PASSWORD" \
                         adminIpAddress="$ADMIN_IP_ADDRESS" \
                         ciPrincipalId="$CI_PRINCIPAL_ID" \
                         fcmSecretProvisioned="$FCM_PROVISIONED"
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          ADMIN_IP_ADDRESS: ${{ secrets.ADMIN_IP_ADDRESS }}
          CI_PRINCIPAL_ID: ${{ secrets.CI_PRINCIPAL_ID }}

      - name: Bicep deploy (provision/update)
        if: inputs.mode == 'deploy'
        # One blanket retry: PG flexible server reports transient ServerIsBusy when a
        # configurations/* write races the server's own async update on a re-deploy;
        # ARM template deployments are idempotent, so a second attempt is safe.
        run: |
          deploy() {
            az deployment group create \
              --resource-group rg-cleansia-${{ matrix.region }}-${{ inputs.env }} \
              --template-file deploy/bicep/main.bicep \
              --parameters ${{ inputs.bicepparamFile }} \
              --parameters postgresAdministratorPassword="$POSTGRES_ADMIN_PASSWORD" \
                           adminIpAddress="$ADMIN_IP_ADDRESS" \
                           ciPrincipalId="$CI_PRINCIPAL_ID" \
                           fcmSecretProvisioned="$FCM_PROVISIONED"
          }
          if ! deploy; then
            echo "::warning::First provision attempt failed (often the transient PG ServerIsBusy) — retrying once in 3 minutes."
            sleep 180
            deploy
          fi
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          ADMIN_IP_ADDRESS: ${{ secrets.ADMIN_IP_ADDRESS }}
          CI_PRINCIPAL_ID: ${{ secrets.CI_PRINCIPAL_ID }}

      # Push the EXTERNAL secrets (the ones Bicep can't derive) from the stage's GitHub-Environment
      # secrets into Key Vault. The DERIVABLE ones (Storage/DB conn strings, Jwt issuer/audience) are
      # written by the Bicep derivedSecrets module — not here. Set these GitHub secrets ONCE per
      # Environment; every deploy syncs them, so they're never hand-set per-API. Each push is skipped
      # if its GitHub secret is empty (so a missing optional secret doesn't fail the deploy).
      #
      # This step is self-sufficient on RBAC: it grants the CI principal Key Vault Secrets Officer if not
      # already assigned (instead of depending on the ciPrincipalId param being set in the Bicep), then
      # waits for RBAC propagation and retries the writes (a fresh role assignment isn't effective
      # instantly). Idempotent — `az role assignment create` is a no-op when the assignment exists.
      - name: Push external secrets to Key Vault
        if: inputs.mode == 'deploy'
        env:
          KV: kv-cleansia-${{ matrix.region }}-${{ inputs.env }}
          RG: rg-cleansia-${{ matrix.region }}-${{ inputs.env }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          CSRF_SECRET: ${{ secrets.CSRF_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_RESET_PASSWORD_TEMPLATE_ID: ${{ secrets.SENDGRID_RESET_PASSWORD_TEMPLATE_ID }}
          SENDGRID_ORDER_RECEIPT_TEMPLATE_ID: ${{ secrets.SENDGRID_ORDER_RECEIPT_TEMPLATE_ID }}
          SENDGRID_EMAIL_CONFIRMATION_TEMPLATE_ID: ${{ secrets.SENDGRID_EMAIL_CONFIRMATION_TEMPLATE_ID }}
          SENDGRID_PERIOD_CLOSED_TEMPLATE_ID: ${{ secrets.SENDGRID_PERIOD_CLOSED_TEMPLATE_ID }}
          SENDGRID_PERIOD_END_REMINDER_TEMPLATE_ID: ${{ secrets.SENDGRID_PERIOD_END_REMINDER_TEMPLATE_ID }}
          SENDGRID_ORDER_STATUS_UPDATE_TEMPLATE_ID: ${{ secrets.SENDGRID_ORDER_STATUS_UPDATE_TEMPLATE_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Grant the CI principal (this OIDC app's service principal) Secrets Officer on the vault.
          CI_OID="$(az ad signed-in-user show --query id -o tsv 2>/dev/null || true)"
          if [ -z "$CI_OID" ]; then
            CI_OID="$(az account show --query user.name -o tsv)"   # OIDC: user.name is the app/client id
            CI_OID="$(az ad sp show --id "$CI_OID" --query id -o tsv)"
          fi
          KV_ID="$(az keyvault show -n "$KV" -g "$RG" --query id -o tsv)"
          az role assignment create --assignee-object-id "$CI_OID" --assignee-principal-type ServicePrincipal \
            --role "Key Vault Secrets Officer" --scope "$KV_ID" --output none 2>/dev/null || true

          set_secret() {
            # $1 = Key Vault secret name, $2 = value; skip if empty. Retry a few times to ride out
            # RBAC propagation on a freshly-granted assignment.
            if [ -z "$2" ]; then echo "skipped $1 (GitHub secret empty)"; return 0; fi
            for attempt in 1 2 3 4 5 6; do
              if az keyvault secret set --vault-name "$KV" --name "$1" --value "$2" --output none 2>/dev/null; then
                echo "set $1"; return 0
              fi
              echo "  $1 not authorized yet (attempt $attempt) — waiting 20s for RBAC propagation…"
              sleep 20
            done
            echo "::error::failed to set $1 after retries (check the CI principal's Key Vault RBAC)"; return 1
          }
          set_secret "Jwt--Key"                     "$JWT_KEY"
          set_secret "Csrf--Secret"                 "$CSRF_SECRET"
          set_secret "Stripe--SecretKey"            "$STRIPE_SECRET_KEY"
          set_secret "Stripe--WebhookSecret"        "$STRIPE_WEBHOOK_SECRET"
          set_secret "Stripe--PublishableKey"       "$STRIPE_PUBLISHABLE_KEY"
          set_secret "SendGrid--ApiKey"                        "$SENDGRID_API_KEY"
          set_secret "SendGrid--ResetPasswordTemplateId"       "$SENDGRID_RESET_PASSWORD_TEMPLATE_ID"
          set_secret "SendGrid--OrderReceiptTemplateId"        "$SENDGRID_ORDER_RECEIPT_TEMPLATE_ID"
          set_secret "SendGrid--EmailConfirmationTemplateId"   "$SENDGRID_EMAIL_CONFIRMATION_TEMPLATE_ID"
          set_secret "SendGrid--PeriodClosedTemplateId"        "$SENDGRID_PERIOD_CLOSED_TEMPLATE_ID"
          set_secret "SendGrid--PeriodEndReminderTemplateId"   "$SENDGRID_PERIOD_END_REMINDER_TEMPLATE_ID"
          set_secret "SendGrid--OrderStatusUpdateTemplateId"   "$SENDGRID_ORDER_STATUS_UPDATE_TEMPLATE_ID"
          set_secret "Sentry--Dsn"                  "$SENTRY_DSN"
          set_secret "Mapbox--GeocodingAccessToken" "$MAPBOX_TOKEN"
          # FCM push dispatch. The Functions host binds FCM__ServiceAccountJson only when the Bicep
          # fcmSecretProvisioned param is true (see the provision step) — which is itself driven by
          # whether this GitHub secret is set, so the KV reference is never wired before the secret
          # exists (an unresolvable reference would dead-letter every push, not no-op cleanly).
          set_secret "Fcm--ServiceAccountJson"      "$FIREBASE_SERVICE_ACCOUNT_JSON"

  # ===========================================================================================
  # Migrate — committed EF migrations applied BEFORE any deploy (ADR-0015 D5). Runs after provision
  # so the DB exists; gates every API/SSR deploy via the needs edge.
  # ===========================================================================================

  migrate-database:
    name: Run DB Migrations
    needs: [build-dotnet, provision]
    # what-if is a preview only: no migrations, no deploys. Skipping this job propagates the skip to
    # every deploy job (they all `need` migrate-database).
    if: inputs.mode == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore packages
        run: dotnet restore Cleansia.Api.sln
        working-directory: ./src

      - name: Build EF migrations bundle
        run: |
          dotnet ef migrations bundle \
            --project Cleansia.Infra.Database/Cleansia.Infra.Database.csproj \
            --startup-project Cleansia.Web.Partner/Cleansia.Web.Partner.csproj \
            --configuration Release \
            --output ./efbundle \
            --force
        working-directory: ./src

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The GitHub-hosted runner has a dynamic public IP that neither firewall rule covers
      # (it is not an "Azure service", and it is not the static admin IP). Open a temporary,
      # uniquely-named firewall rule for THIS runner's IP just for the migration, and always
      # remove it afterwards (even on failure). This avoids both a self-hosted runner and an
      # open-to-the-world 0.0.0.0/0 rule.
      # Open a temporary firewall rule for THIS runner's IP via the ARM REST API (az rest) rather than the
      # `az postgres flexible-server firewall-rule` command — the latter's flag names (--name vs
      # --server-name vs --rule-name) differ across azure-cli versions on the runner and kept failing.
      # The REST PUT is version-independent. The rule is removed afterwards (always(), best-effort).
      - name: Open Postgres firewall for the runner
        run: |
          RUNNER_IP="$(curl -s https://api.ipify.org)"
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          SUB_ID="$(az account show --query id -o tsv)"
          az rest --method put \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/rg-cleansia-${{ matrix.region }}-${{ inputs.env }}/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-cleansia-${{ matrix.region }}-${{ inputs.env }}/firewallRules/ci-migrate-${{ github.run_id }}?api-version=2024-08-01" \
            --body "{\"properties\":{\"startIpAddress\":\"${RUNNER_IP}\",\"endIpAddress\":\"${RUNNER_IP}\"}}"

      - name: Apply migrations
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          chmod +x ./src/efbundle
          ./src/efbundle --connection "$DB_CONNECTION_STRING"

      - name: Remove the runner firewall rule
        if: always()
        run: |
          SUB_ID="$(az account show --query id -o tsv)"
          az rest --method delete \
            --url "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/rg-cleansia-${{ matrix.region }}-${{ inputs.env }}/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-cleansia-${{ matrix.region }}-${{ inputs.env }}/firewallRules/ci-migrate-${{ github.run_id }}?api-version=2024-08-01" || true

  # ===========================================================================================
  # Deploy — the five API hosts. Parallel: each needs [provision, migrate-database] only (ADR-0015 D5,
  # B2 relaxes the old B1 serial chain). The migrate-before-deploy ordering is held by the needs edge.
  # ===========================================================================================

  deploy-partner-api:
    name: Deploy Partner API
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: partner-api
          path: ./partner-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-cleansia-partner-${{ matrix.region }}-${{ inputs.env }}
          package: ./partner-api

  deploy-admin-api:
    name: Deploy Admin API
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-api
          path: ./admin-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-cleansia-admin-${{ matrix.region }}-${{ inputs.env }}
          package: ./admin-api

  deploy-customer-api:
    name: Deploy Customer API
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: customer-api
          path: ./customer-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-cleansia-customer-${{ matrix.region }}-${{ inputs.env }}
          package: ./customer-api

  deploy-partner-mobile-api:
    name: Deploy Partner-Mobile API
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: partner-mobile-api
          path: ./partner-mobile-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-cleansia-partner-mobile-${{ matrix.region }}-${{ inputs.env }}
          package: ./partner-mobile-api

  deploy-customer-mobile-api:
    name: Deploy Customer-Mobile API
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: customer-mobile-api
          path: ./customer-mobile-api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-cleansia-customer-mobile-${{ matrix.region }}-${{ inputs.env }}
          package: ./customer-mobile-api

  # ===========================================================================================
  # Functions — container via ACR (ADR-0015 D2; QuestPDF native deps mandate the container).
  # ===========================================================================================

  build-and-deploy-functions:
    name: Deploy Functions
    needs: [build-dotnet, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image cleansia-functions:${{ github.sha }} \
            --file src/Cleansia.Functions/Dockerfile \
            src/

      - name: Deploy to Azure Functions
        run: |
          az functionapp config container set \
            --name func-cleansia-${{ matrix.region }}-${{ inputs.env }} \
            --resource-group rg-cleansia-${{ matrix.region }}-${{ inputs.env }} \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/cleansia-functions:${{ github.sha }}"

      - name: Restart Functions App
        run: |
          az functionapp restart --name func-cleansia-${{ matrix.region }}-${{ inputs.env }} --resource-group rg-cleansia-${{ matrix.region }}-${{ inputs.env }}

  # ===========================================================================================
  # Customer SSR — Node App Service. Parallel with the APIs (build-angular + provision + migrate).
  # ===========================================================================================

  deploy-customer-ssr:
    name: Deploy Customer SSR
    needs: [build-angular, provision, migrate-database]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: customer-app
          path: ./customer-app

      - name: Configure startup command
        run: az webapp config set --name web-cleansia-customer-${{ matrix.region }}-${{ inputs.env }} --resource-group rg-cleansia-${{ matrix.region }}-${{ inputs.env }} --startup-file "node server/server.mjs"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: web-cleansia-customer-${{ matrix.region }}-${{ inputs.env }}
          package: ./customer-app

  # ===========================================================================================
  # SPAs — partner + admin Static Web Apps. Parallel; need build-angular + provision (no DB).
  # Per-Environment SWA tokens referenced by NAME only.
  # ===========================================================================================

  deploy-partner-spa:
    name: Deploy Partner SPA
    needs: [build-angular, provision]
    # SPAs don't need the DB, so they don't `need` migrate-database — guard them directly so a what-if
    # preview never deploys.
    if: inputs.mode == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: partner-app
          path: ./partner-app

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PARTNER }}
          action: upload
          app_location: ./partner-app
          skip_app_build: true

  deploy-admin-spa:
    name: Deploy Admin SPA
    needs: [build-angular, provision]
    # See deploy-partner-spa: guarded directly because the SPAs don't depend on migrate-database.
    if: inputs.mode == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        region: ["${{ inputs.region }}"]
    environment: ${{ inputs.githubEnvironment }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-app
          path: ./admin-app

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ADMIN }}
          action: upload
          app_location: ./admin-app
          skip_app_build: true
