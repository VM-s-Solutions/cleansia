name: Deploy to DEV

# THIN caller for the shared pipeline (deploy-azure.yml) — the entire build/provision/migrate/deploy
# flow lives there so dev and prod cannot drift. This file owns only what is dev-specific:
#
# - DEV trigger is HYBRID: auto-deploys on every push to master (dev tracks master), AND a manual
#   "Run workflow" button (Actions tab) with a mode choice (`deploy` = provision/update + deploy;
#   `what-if` = a non-mutating Bicep preview that changes nothing). It NEVER runs inside a PR.
#   A push to master always means `deploy`; only the manual dispatch can pick `what-if`.
#   (Prod — deploy-pro.yml — is dispatch-only behind the reviewer-protected `prod-weu` Environment;
#   it never auto-deploys.)
# - The effective mode is computed once in the `resolve` job (push → deploy; dispatch → the chosen
#   input) and passed to the reusable workflow as the `mode` input.
# - Concurrency stays caller-level: one dev deploy at a time, newest wins.
# - `secrets: inherit` + the reusable jobs' `environment: dev-weu` resolve every secret by NAME from
#   the dev-weu GitHub Environment; no secret value is in this file (ADR-0015 D4).

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      mode:
        description: 'deploy = provision + migrate + deploy all hosts; what-if = non-mutating Bicep preview only'
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - what-if

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # Resolve the effective mode ONCE: a push to master is always a real `deploy`; a manual dispatch
  # uses the chosen input. The reusable workflow receives it as `inputs.mode` so the deploy/what-if
  # logic is identical for both triggers.
  resolve:
    name: Resolve mode
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=deploy" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Dev pipeline
    needs: resolve
    uses: ./.github/workflows/deploy-azure.yml
    permissions:
      id-token: write
      contents: read
    with:
      env: dev
      githubEnvironment: dev-weu
      mode: ${{ needs.resolve.outputs.mode }}
      region: weu
      bicepparamFile: deploy/bicep/weu.dev.bicepparam
    secrets: inherit
