name: Deploy Docs

# DEACTIVATED (owner request 2026-07-15): the automatic push trigger is disabled so docs
# changes no longer spin a deploy. Left runnable on demand via the Actions tab. To re-enable
# automatic deploys, restore the `push:` trigger (branches: master, paths: docs/**).
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: cd docs && npm ci

      - name: Build VitePress site
        run: cd docs && npm run build

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DOCS_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: docs/.vitepress/dist
          skip_app_build: true
          skip_api_build: true
