name: Deploy to PRO

# THIN caller for the shared pipeline (deploy-azure.yml) — the SAME build/provision/migrate/deploy
# flow as dev, pointed at the prod footprint. This file owns only what is prod-specific:
#
# - Dispatch-ONLY (never a push trigger): prod deploys are always a deliberate button press, and the
#   mode defaults to `what-if` so the no-thought path is the non-mutating preview; a real `deploy`
#   is an explicit choice.
# - The old typed-"deploy"-confirmation gate is REPLACED by GitHub Environment protection: every job
#   that touches prod runs in the `prod-weu` Environment (set inside the reusable workflow), whose
#   REQUIRED REVIEWERS must approve the run before any prod secret is released. That protection is
#   UI config, not YAML — see the PROD section of deploy/AZURE-DEV-RUNBOOK.md for the setup steps.
# - Concurrency stays caller-level: one prod run at a time, and an in-flight prod deploy is never
#   cancelled by a newer one.
# - `secrets: inherit` + the reusable jobs' `environment: prod-weu` resolve every secret by NAME from
#   the prod-weu GitHub Environment (same secret NAMES as dev-weu, prod values); no secret value is
#   in this file (ADR-0015 D4).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'deploy = provision + migrate + deploy all hosts; what-if = non-mutating Bicep preview only'
        type: choice
        required: true
        default: what-if
        options:
          - deploy
          - what-if

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-pro
  cancel-in-progress: false

jobs:
  deploy:
    name: Prod pipeline
    uses: ./.github/workflows/deploy-azure.yml
    permissions:
      id-token: write
      contents: read
    with:
      env: prod
      githubEnvironment: prod-weu
      mode: ${{ inputs.mode }}
      region: weu
      bicepparamFile: deploy/bicep/weu.prod.bicepparam
    secrets: inherit
