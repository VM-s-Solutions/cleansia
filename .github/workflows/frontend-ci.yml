name: Frontend CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # Nx 'affected' needs the merge-base with the target branch, so fetch history.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./src/Cleansia.App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./src/Cleansia.App

      # Derive the Nx affected base (the PR target branch) so lint/test only run on
      # projects the change actually touches — fast, and still a real gate.
      - name: Set Nx base
        run: echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"

      # Lint is INFORMATIONAL for now (continue-on-error): the lint baseline has
      # pre-existing debt in several libs (module-boundary, a11y, unused-var), so making
      # it blocking today would red every PR on debt the change didn't introduce. It still
      # runs so regressions are visible in the PR. Flip to blocking once the baseline is
      # clean (tracked as a follow-up lint-cleanup ticket).
      - name: Lint (affected, non-blocking)
        continue-on-error: true
        run: npx nx affected -t lint --base="$NX_BASE" --head=HEAD --parallel=3
        working-directory: ./src/Cleansia.App

      # Jest unit tests — the suites (facades, components, parity guards, a11y) that
      # CI was not running before. Affected-only keeps it quick.
      - name: Unit tests (affected)
        run: npx nx affected -t test --base="$NX_BASE" --head=HEAD --parallel=3 --ci
        working-directory: ./src/Cleansia.App

      # Production builds of all 3 apps stay an explicit gate (they catch generated-client
      # / template / SSR breakage that unit tests miss — e.g. the NSwag regen drift).
      - name: Build Customer App
        run: npm run build:cleansia-customer
        working-directory: ./src/Cleansia.App

      - name: Build Partner App
        run: npm run build:cleansia-partner
        working-directory: ./src/Cleansia.App

      - name: Build Admin App
        run: npm run build:cleansia-admin
        working-directory: ./src/Cleansia.App

  # ── Phase-0 E2E smokes (T-0271 customer + T-0281 partner & admin) ──
  # Runs the three Playwright critical-path smokes through the REAL UIs:
  #   - T-0271 customer: booking wizard → Stripe checkout handoff (apps/cleansia.app-e2e)
  #   - T-0281 partner:  login → jobs (orders) landing            (apps/cleansia-partner.app-e2e)
  #   - T-0281 admin:    login → admin home (employee-management) (apps/cleansia-admin.app-e2e)
  # Backend seam for ALL THREE: Playwright network-stubbing (no live API / Postgres)
  # — documented in each spec header. This is its OWN job (NOT Nx-affected gated) so
  # a change anywhere that breaks a critical path can't silently skip it.
  #
  # The three smokes run as SEQUENTIAL steps, not in parallel: each app's Playwright
  # `webServer` boots `nx run <app>:serve` on the same :4200, so they cannot share a
  # job concurrently — each step boots and tears down its own app server in turn.
  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./src/Cleansia.App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./src/Cleansia.App

      # A single browser is enough for a smoke; every e2e config is chromium-only.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: ./src/Cleansia.App

      # `e2e-ci` is Nx's canonical CI entry: it runs `playwright test`, whose
      # webServer boots `nx run <app>:serve` and waits (up to the config's 300s)
      # for the dev server before the spec runs. (`npm test` → `nx e2e cleansia.app-e2e`
      # runs the identical customer spec for local use.)
      - name: Run customer booking smoke
        run: npx nx run cleansia.app-e2e:e2e-ci
        working-directory: ./src/Cleansia.App

      - name: Run partner login → jobs smoke
        run: npx nx run cleansia-partner.app-e2e:e2e-ci
        working-directory: ./src/Cleansia.App

      - name: Run admin login → home smoke
        run: npx nx run cleansia-admin.app-e2e:e2e-ci
        working-directory: ./src/Cleansia.App

      - name: Upload Playwright reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./src/Cleansia.App/dist/.playwright/apps/*-e2e/playwright-report
          retention-days: 7
