name: iOS CI

# macOS runners bill at a higher rate than Linux, so only run this when the iOS
# sources (or this workflow) actually change — backend/frontend PRs skip it.
# Also runs on pushes to master: direct-to-master commits used to bypass this
# gate entirely (pull_request-only), which let lint-red code land unnoticed.
on:
  pull_request:
    branches:
      - '*'
    paths:
      - 'src/cleansia_ios/**'
      # Shared mobile OpenAPI specs (committed in the Android tree) that
      # scripts/generate-api-clients.sh consumes — a spec-only change must
      # re-run the iOS codegen + builds too.
      - 'src/cleansia_android/openapi/**'
      - '.github/workflows/ios-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'src/cleansia_ios/**'
      - 'src/cleansia_android/openapi/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./src/cleansia_ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The runner's DEFAULT Xcode lags the newest SDK on the image, while local dev
      # builds against the newest installed Xcode. Any #available-gated API newer than
      # the default SDK then compiles locally but fails CI (bit us with the since-retired
      # Liquid Glass bar). Select the newest Xcode the image ships so CI's SDK tracks
      # what local dev builds against.
      - name: Select the newest Xcode on the runner
        run: |
          set -euo pipefail
          NEWEST="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          echo "Selecting: $NEWEST"
          sudo xcode-select -s "$NEWEST"
          xcodebuild -version

      # xcodegen + xcbeautify are not on the runner image; installing them keeps
      # CI independent of image drift. SwiftLint is NOT brew-installed here — it
      # is pinned below (like SwiftFormat + openapi-generator), because the
      # runner image's bundled swiftlint version drifts and a new default/rule
      # silently fails CI on code that passed a dev's local lint.
      - name: Install toolchain
        run: brew install xcodegen xcbeautify

      # openapi-generator is PINNED (not brew-latest) for the same reason as
      # SwiftFormat below: the generated business clients are wire-load-bearing,
      # and a generator bump silently changes their output. 7.10.0 matches the
      # version Android pins for the same shared specs
      # (src/cleansia_android/gradle/libs.versions.toml → org.openapi.generator),
      # so both platforms generate one contract with one generator. Checksum-
      # verified jar from Maven Central; the runner image ships a Temurin JDK,
      # and generate-api-clients.sh only needs `openapi-generator` on PATH.
      - name: Install openapi-generator (pinned 7.10.0)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/openapi-generator-cli.jar \
            https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.10.0/openapi-generator-cli-7.10.0.jar
          echo "615e014705af34861e789e0b2a11075d3c80db134f881e937265479a4a83996e  /tmp/openapi-generator-cli.jar" \
            | shasum -a 256 -c -
          sudo mkdir -p /usr/local/bin /usr/local/lib
          sudo mv /tmp/openapi-generator-cli.jar /usr/local/lib/openapi-generator-cli.jar
          printf '#!/usr/bin/env bash\nexec java -jar /usr/local/lib/openapi-generator-cli.jar "$@"\n' \
            | sudo tee /usr/local/bin/openapi-generator >/dev/null
          sudo chmod +x /usr/local/bin/openapi-generator
          openapi-generator version

      # SwiftFormat is PINNED (not brew-latest): a brew bump silently adds new default
      # rules, failing CI on code that passed a dev's older local lint (the docComments
      # + redundantEmptyView drift we hit twice). Devs: match this version locally
      # (`brew install swiftformat` then check `--version`, or download the same release).
      # Installed into a dedicated dir PREPENDED to PATH (via GITHUB_PATH), NOT
      # /usr/local/bin: the Apple-Silicon runner image ships its own brew
      # swiftformat in /opt/homebrew/bin, which sits earlier in PATH and
      # silently shadowed the /usr/local/bin pin — the lint then ran whatever
      # version the image bundled (0.62.1 flagged 94 files that are clean under
      # the pinned 0.60.1). The lint steps below also assert the version so any
      # future shadowing fails loudly at the install, not as mystery lint churn.
      - name: Install SwiftFormat (pinned 0.60.1)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/swiftformat.zip \
            https://github.com/nicklockwood/SwiftFormat/releases/download/0.60.1/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat-bin
          BIN="$(find /tmp/swiftformat-bin -name swiftformat -type f -perm -u+x | head -1)"
          mkdir -p "$RUNNER_TEMP/pinned-tools"
          install "$BIN" "$RUNNER_TEMP/pinned-tools/swiftformat"
          echo "$RUNNER_TEMP/pinned-tools" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/pinned-tools/swiftformat" --version

      # SwiftLint is PINNED for the same reason as SwiftFormat: the runner
      # image's bundled swiftlint drifts, and a version bump can add a rule that
      # fails CI on code a dev linted clean locally. 0.65.0 is the version this
      # tree is verified clean against; match it locally (`brew install
      # swiftlint`, or download the same release) before pushing. Same
      # pinned-tools dir as SwiftFormat so this pin cannot be PATH-shadowed
      # either.
      - name: Install SwiftLint (pinned 0.65.0)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/swiftlint.zip \
            https://github.com/realm/SwiftLint/releases/download/0.65.0/portable_swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint-bin
          BIN="$(find /tmp/swiftlint-bin -name swiftlint -type f -perm -u+x | head -1)"
          mkdir -p "$RUNNER_TEMP/pinned-tools"
          install "$BIN" "$RUNNER_TEMP/pinned-tools/swiftlint"
          "$RUNNER_TEMP/pinned-tools/swiftlint" version

      # The generated business client (CleansiaPartnerApi / CleansiaCustomerApi) is
      # gitignored and machine-owned — regenerate it from the committed mobile specs
      # before xcodegen, since both project.yml files now depend on it.
      - name: Generate API clients
        run: ./scripts/generate-api-clients.sh

      # The .xcodeproj files are gitignored — regenerate them from the project.yml
      # specs, exactly like a fresh dev checkout does.
      - name: Generate Xcode projects
        run: |
          (cd CleansiaPartner  && xcodegen generate)
          (cd CleansiaCustomer && xcodegen generate)

      # ADR-0016 blocking quality gate — same bar developers run locally. Each
      # step first asserts the PINNED version actually resolved (see the
      # install-step comment: the image's /opt/homebrew tools once shadowed the
      # pin and linted with a drifted version).
      - name: SwiftFormat (lint)
        run: |
          set -euo pipefail
          command -v swiftformat
          test "$(swiftformat --version)" = "0.60.1"
          swiftformat --lint .

      - name: SwiftLint (strict)
        run: |
          set -euo pipefail
          command -v swiftlint
          swiftlint version | grep -qx "0.65.0"
          swiftlint lint --strict

      # Pick whichever iPhone simulator this runner's Xcode actually ships, so the
      # destination doesn't break when the image's device list changes.
      - name: Select a simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available \
            | grep -Eo 'iPhone [0-9]+( Pro( Max)?| Plus)?' | head -1)
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # CleansiaCore is iOS-only: a bare `swift build` host-builds for macOS and
      # fails the SwiftUI availability checks, so build/test on the simulator.
      - name: Build & test CleansiaCore
        working-directory: ./src/cleansia_ios/CleansiaCore
        run: |
          set -o pipefail
          xcodebuild -scheme CleansiaCore \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            build test | xcbeautify

      # CleansiaPartner has a hosted test target — run it so the partner VM +
      # security test suite (TC-IOS-*-OWNERSHIP etc.) actually gates in CI, not
      # just compiles.
      - name: Build & test CleansiaPartner
        run: |
          set -o pipefail
          xcodebuild -workspace Cleansia.xcworkspace -scheme CleansiaPartner \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            build test | xcbeautify

      # CleansiaCustomer now has a hosted test target (T-0312) — run it so the
      # customer VM + router suite gates in CI from the first customer slice.
      - name: Build & test CleansiaCustomer
        run: |
          set -o pipefail
          xcodebuild -workspace Cleansia.xcworkspace -scheme CleansiaCustomer \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            build test | xcbeautify
