<cleansia-dev-banner [bugReportUrl]="bugReportUrl" />
<div class="app-layout" [attr.data-sidebar-collapsed]="sidebarCollapsed()">
  @if (isLoggedIn) {
  <cleansia-sidebar-menu
    [menuItems]="sidebarMenuItems"
    (collapsedChange)="onSidebarCollapsedChange($event)"
  />
  }
  <main class="main-content" [ngClass]="{ 'main-content__margin': isLoggedIn }">
    <router-outlet></router-outlet>
  </main>

  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <!-- Cookie Consent Banner -->
  <cleansia-cookie-consent
    [storageKey]="'cleansia-admin-cookie-consent'"
    [showDeclineButton]="true"
    [position]="'bottom'"
  />
</div>
