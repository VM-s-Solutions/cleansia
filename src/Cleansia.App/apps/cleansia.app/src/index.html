<!DOCTYPE html>
<html lang="en" style="color-scheme: light">
  <head>
    <script>
      // Sync color-scheme with stored theme before CSS loads,
      // so PrimeFlex light-dark() picks the correct values.
      (function() {
        var t = localStorage.getItem('cleansia-theme');
        if (t === 'dark') {
          document.documentElement.style.colorScheme = 'dark';
          document.documentElement.classList.add('dark-mode');
        }
      })();
    </script>
    <meta charset="utf-8" />
    <title>Cleansia</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Cleansia - Professional cleaning services in Prague and surroundings. Book your cleaning today!" />
    <link rel="icon" type="image/x-icon" href="assets/logos/Logo.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preload"
      as="style"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    /></noscript>
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@6.6.6/css/flag-icons.min.css"
    /></noscript>

    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/primeflex@4.0.0/primeflex.min.css"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://cdn.jsdelivr.net/npm/primeflex@4.0.0/primeflex.min.css"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/primeflex@4.0.0/primeflex.min.css"
    /></noscript>
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css"
    /></noscript>

    <style>
      body {
        font-family: 'Nunito', sans-serif;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
