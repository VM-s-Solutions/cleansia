<cleansia-dynamic-background>
  <cleansia-language-switcher />
  <div class="cleansia-login">
    <div class="cleansia-login__mascot">
      <img src="assets/images/mascot/mascot-waving.png" alt="Cleansia mascot" />
    </div>
    <form class="cleansia-login__login-card" [formGroup]="facade.formGroup">
      <div class="cleansia-login__brand-name-container">
        <cleansia-brand-name />
      </div>
      <div class="cleansia-login__header">
        <cleansia-title [title]="'global.actions.login' | translate" />
      </div>
      <div class="cleansia-login__email">
        <cleansia-text-input
          [label]="'auth.login.email' | translate"
          [floatVariant]="'on'"
          formControlName="email"
          dataType="email"
          [showErrors]="true"
        />
      </div>
      <div class="cleansia-login__password">
        <cleansia-text-input
          [label]="'auth.login.password' | translate"
          [floatVariant]="'on'"
          formControlName="password"
          dataType="password"
          [required]="true"
          [showErrors]="true"
        />
      </div>
      <div class="cleansia-login__password-actions">
        <div class="cleansia-login__remember-me">
          <cleansia-checkbox
            [title]="'global.user.remember_me' | translate"
            formControlName="rememberMe"
          />
          <span>{{ 'auth.login.remember_me' | translate }}</span>
        </div>
      </div>
      <div class="cleansia-login__user-actions">
        <cleansia-button
          [buttonType]="'submit'"
          [style]="'raised-button'"
          [title]="'global.actions.login' | translate"
          (clickFn)="facade.login()"
          [loading]="facade.loading() ?? false"
        />
      </div>
    </form>
  </div>
</cleansia-dynamic-background>
