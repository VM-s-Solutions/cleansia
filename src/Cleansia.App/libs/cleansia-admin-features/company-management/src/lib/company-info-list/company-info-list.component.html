<div class="cleansia-company-management">
  <cleansia-language-switcher />
  <div class="cleansia-company-management__container">
    <div class="cleansia-company-management__header">
      <div class="header-content">
        <cleansia-title
          [title]="'pages.company_management.title' | translate"
        />
        <p class="cleansia-company-management__description">
          {{ 'pages.company_management.description' | translate }}
        </p>
      </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
      <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-grid">
          <!-- Search Filter -->
          <div class="filter-field">
            <cleansia-text-input
              formControlName="searchTerm"
              [placeholder]="
                'pages.company_management.filters.search' | translate
              "
              className="w-full"
            />
          </div>
        </div>

        <!-- Filter Actions -->
        <div class="filter-actions">
          <cleansia-button
            [label]="'pages.company_management.filters.reset' | translate"
            icon="pi pi-times"
            (onClick)="resetFilters()"
            severity="secondary"
            [outlined]="true"
          /><cleansia-button
            [label]="'pages.company_management.create_company' | translate"
            icon="pi pi-plus"
            (onClick)="createCompanyInfo()"
          />
        </div>
      </form>
    </div>

    <!-- Company Info Table -->
    <cleansia-section>
      @if (facade.loading() && facade.companyInfos().length === 0) {
      <cleansia-loader />
      } @else {
      <cleansia-table
        [data]="facade.companyInfos()"
        [tableDefinition]="companyInfoTableDefinition"
        [paginator]="true"
        [rows]="20"
        [emptyMessage]="'pages.company_management.no_companies'"
        tableClass="cleansia-company-management__table"
        [loading]="facade.loading()"
        (sortChange)="onSortChange($event)"
      >
      </cleansia-table>
      }
    </cleansia-section>
  </div>
</div>

<p-confirmDialog />
