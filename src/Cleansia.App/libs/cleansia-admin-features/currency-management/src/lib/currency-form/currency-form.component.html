<div class="cleansia-currency-form">
  <div class="cleansia-currency-form__container page-wrapper">
    <!-- Header with Back Button -->
    <div class="cleansia-currency-form__header">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        (onClick)="onCancel()"
        [outlined]="true"
      />
      <cleansia-title [title]="pageTitle()" />
    </div>

    @if (facade.loading()) {
    <cleansia-loader />
    } @else {
    <form
      [formGroup]="form"
      (ngSubmit)="onSave()"
      class="cleansia-currency-form__content"
    >
      <cleansia-section [title]="'pages.currency_form.basic_info' | translate">
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.currency_form.code' | translate"
              formControlName="code"
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.currency_form.symbol' | translate"
              formControlName="symbol"
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.currency_form.name' | translate"
              formControlName="name"
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.currency_form.exchange_rate' | translate"
              formControlName="exchangeRate"
              [required]="true"
              dataType="number"
            />
          </div>
        </div>
      </cleansia-section>

      <div class="form-actions">
        <cleansia-button
          [label]="'global.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="
            isEditMode()
              ? ('global.actions.save' | translate)
              : ('global.actions.create' | translate)
          "
          type="submit"
          [disabled]="facade.saving()"
          [loading]="facade.saving()"
          (onClick)="onSave()"
        />
      </div>
    </form>
    }
  </div>
</div>
