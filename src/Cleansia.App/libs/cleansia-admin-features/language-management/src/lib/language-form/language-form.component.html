<div class="language-form-page">
  <div class="page-header">
    <cleansia-title [title]="pageTitle()">
      <cleansia-language-switcher />
    </cleansia-title>
  </div>

  <div class="page-content">
    <div class="header-actions">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        [outlined]="true"
        (onClick)="onCancel()"
      />
    </div>

    @if (facade.loading()) {
    <cleansia-loader />
    } @else {
    <form
      [formGroup]="form"
      (ngSubmit)="onSave()"
      class="language-form-container"
    >
      <cleansia-section [title]="'pages.language_form.basic_info' | translate">
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.language_form.code' | translate"
              formControlName="code"
              [required]="true"
              [disabled]="isEditMode()"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.language_form.name' | translate"
              formControlName="name"
              [required]="true"
            />
          </div>
        </div>
      </cleansia-section>

      <div class="form-actions">
        <cleansia-button
          [label]="'global.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="
            isEditMode()
              ? ('global.actions.save' | translate)
              : ('global.actions.create' | translate)
          "
          type="submit"
          [disabled]="facade.saving()"
          [loading]="facade.saving()"
          (onClick)="onSave()"
        />
      </div>
    </form>
    }
  </div>
</div>
