<div class="cleansia-promo-code-form">
  <div class="cleansia-promo-code-form__container page-wrapper">
    <div class="cleansia-promo-code-form__header">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        (onClick)="onCancel()"
        [outlined]="true"
      />
      <cleansia-title [title]="pageTitle()" />
    </div>

    @if (facade.loading()) {
      <cleansia-loader />
    } @else {
      <form
        [formGroup]="form"
        (ngSubmit)="onSave()"
        class="cleansia-promo-code-form__content"
      >
        <cleansia-section
          [title]="'pages.promo_codes.form.field.code' | translate"
        >
          <div class="form-grid">
            <div class="form-field">
              <cleansia-text-input
                [label]="'pages.promo_codes.form.field.code' | translate"
                formControlName="code"
                [required]="true"
              />
              <small class="field-help">
                {{ 'pages.promo_codes.form.field.code_help' | translate }}
              </small>
            </div>
            <div class="form-field">
              <cleansia-select
                [label]="'pages.promo_codes.form.field.type' | translate"
                formControlName="type"
                [options]="typeOptions()"
                [showClear]="false"
              />
            </div>

            @if (isPercent()) {
              <div class="form-field">
                <cleansia-text-input
                  [label]="
                    'pages.promo_codes.form.field.discount_percent' | translate
                  "
                  formControlName="discountPercentUi"
                  dataType="number"
                  [required]="true"
                />
              </div>
            } @else {
              <div class="form-field">
                <cleansia-text-input
                  [label]="
                    'pages.promo_codes.form.field.discount_amount' | translate
                  "
                  formControlName="discountAmount"
                  dataType="number"
                  [required]="true"
                />
              </div>
              <div class="form-field">
                <cleansia-select
                  [label]="
                    'pages.promo_codes.form.field.currency' | translate
                  "
                  formControlName="currencyId"
                  [options]="currencyOptions()"
                  [required]="true"
                />
              </div>
            }
          </div>
        </cleansia-section>

        <cleansia-section
          [title]="'pages.promo_codes.form.field.min_order' | translate"
        >
          <div class="form-grid">
            <div class="form-field">
              <cleansia-text-input
                [label]="'pages.promo_codes.form.field.min_order' | translate"
                formControlName="minimumOrderAmount"
                dataType="number"
              />
            </div>
            <div class="form-field">
              <cleansia-text-input
                [label]="
                  'pages.promo_codes.form.field.max_per_user' | translate
                "
                formControlName="maxRedemptionsPerUser"
                dataType="number"
                [required]="true"
              />
            </div>
            <div class="form-field">
              <cleansia-checkbox
                [label]="
                  'pages.promo_codes.form.field.global_max_enabled'
                    | translate
                "
                formControlName="globalMaxEnabled"
              />
            </div>
            @if (form.controls.globalMaxEnabled.value) {
              <div class="form-field">
                <cleansia-text-input
                  [label]="
                    'pages.promo_codes.form.field.global_max' | translate
                  "
                  formControlName="globalMaxRedemptions"
                  dataType="number"
                  [required]="true"
                />
              </div>
            }
          </div>
        </cleansia-section>

        <cleansia-section
          [title]="'pages.promo_codes.form.field.valid_from' | translate"
        >
          <div class="form-grid">
            <div class="form-field">
              <cleansia-calendar
                [label]="
                  'pages.promo_codes.form.field.valid_from' | translate
                "
                formControlName="validFrom"
              />
            </div>
            <div class="form-field">
              <cleansia-calendar
                [label]="
                  'pages.promo_codes.form.field.valid_until' | translate
                "
                formControlName="validUntil"
              />
            </div>
            @if (form.errors?.['validityRange']) {
              <div class="form-field full-width">
                <small class="field-error">
                  {{
                    'pages.promo_codes.form.validation.validity_range'
                      | translate
                  }}
                </small>
              </div>
            }
          </div>
        </cleansia-section>

        <cleansia-section
          [title]="'pages.promo_codes.form.field.description' | translate"
        >
          <div class="form-grid">
            <div class="form-field full-width">
              <cleansia-textarea
                [label]="
                  'pages.promo_codes.form.field.description' | translate
                "
                formControlName="description"
                [rows]="3"
              />
            </div>
            <div class="form-field">
              <cleansia-checkbox
                [label]="'pages.promo_codes.form.field.active' | translate"
                formControlName="isActive"
              />
            </div>
          </div>
        </cleansia-section>

        <div class="form-actions">
          <cleansia-button
            [label]="'pages.promo_codes.form.cancel' | translate"
            [outlined]="true"
            (onClick)="onCancel()"
          />
          <cleansia-button
            [label]="
              isEditMode()
                ? ('pages.promo_codes.form.submit_update' | translate)
                : ('pages.promo_codes.form.submit_create' | translate)
            "
            type="submit"
            [disabled]="facade.saving()"
            [loading]="facade.saving()"
            (onClick)="onSave()"
          />
        </div>
      </form>
    }
  </div>
</div>
