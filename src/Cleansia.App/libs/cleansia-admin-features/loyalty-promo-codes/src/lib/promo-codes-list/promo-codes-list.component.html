<div class="cleansia-promo-codes-list">
  <div class="cleansia-promo-codes-list__container page-wrapper">
    <div class="cleansia-promo-codes-list__header">
      <div class="header-content">
        <cleansia-title [title]="'pages.promo_codes.title' | translate" />
      </div>
      <div class="header-actions">
        <cleansia-button
          *cleansiaPermission="Policy.CanCreatePromoCode"
          [label]="'pages.promo_codes.new_button' | translate"
          icon="pi pi-plus"
          (onClick)="createPromoCode()"
        />
      </div>
    </div>

    <cleansia-section>
      <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-row">
          <cleansia-text-input
            formControlName="searchCode"
            [placeholder]="
              'pages.promo_codes.search_placeholder' | translate
            "
            className="w-full"
          />
          <cleansia-select
            formControlName="status"
            [options]="translatedStatusOptions"
            [showClear]="false"
          />
        </div>
      </form>

      @if (facade.initialLoading()) {
        <cleansia-loader />
      } @else {
        <cleansia-table
          [data]="facade.promoCodes()"
          [columns]="promoCodeColumns"
          [actions]="promoCodeActions"
          [config]="{
            paginator: true,
            rows: 20,
            lazy: true,
            totalRecords: facade.totalRecords(),
            emptyMessage: 'pages.promo_codes.empty_list'
          }"
          [loading]="facade.loading()"
          (pageChange)="onPageChange($event)"
        />
      }
    </cleansia-section>
  </div>
</div>

<p-confirmDialog />
