<div class="cleansia-membership-plan-list">
  <div class="cleansia-membership-plan-list__container page-wrapper">
    <div class="cleansia-membership-plan-list__header">
      <div class="header-content">
        <cleansia-title [title]="'pages.membership_plans.title' | translate" />
        <p class="cleansia-membership-plan-list__description">
          {{ 'pages.membership_plans.description' | translate }}
        </p>
      </div>
      <cleansia-button
        *cleansiaPermission="Policy.CanCreateMembershipPlan"
        [label]="'pages.membership_plans.create_plan' | translate"
        icon="pi pi-plus"
        (onClick)="createPlan()"
      />
    </div>

    <cleansia-section>
      <form [formGroup]="filterForm" class="filter-form">
        <div class="filter-row">
          <cleansia-text-input
            formControlName="search"
            [placeholder]="'pages.membership_plans.filter.search' | translate"
          />
          <cleansia-checkbox
            formControlName="activeOnly"
            [label]="'pages.membership_plans.filter.active_only' | translate"
          />
        </div>
      </form>

      @if (facade.initialLoading()) {
        <cleansia-loader />
      } @else if (facade.hasError()) {
        <div class="cleansia-membership-plan-list__state">
          <i class="pi pi-exclamation-triangle"></i>
          <p>{{ 'pages.membership_plans.load_error' | translate }}</p>
        </div>
      } @else {
        <cleansia-table
          [data]="facade.plans()"
          [columns]="planColumns"
          [actions]="planActions"
          [config]="{
            paginator: true,
            rows: 20,
            lazy: true,
            totalRecords: facade.totalRecords(),
            emptyMessage: 'pages.membership_plans.empty',
            hover: true
          }"
          [loading]="facade.loading()"
          (pageChange)="onPageChange($event)"
        />
      }
    </cleansia-section>
  </div>
</div>

<ng-template #statusTemplate let-item>
  <span
    [class]="
      item.isActive
        ? 'membership-plan-status-badge status-active'
        : 'membership-plan-status-badge status-inactive'
    "
  >
    {{
      (item.isActive ? 'global.status.active' : 'global.status.inactive')
        | translate
    }}
  </span>
</ng-template>
