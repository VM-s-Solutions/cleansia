<div class="cleansia-pay-config-form">
  <div class="cleansia-pay-config-form__container page-wrapper">
    <div class="cleansia-pay-config-form__header">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        (onClick)="onCancel()"
        [outlined]="true"
      />
      <cleansia-title [title]="pageTitle()" />
    </div>

    @if (facade.loading()) {
    <cleansia-loader />
    } @else {
    <form
      [formGroup]="form"
      (ngSubmit)="onSave()"
      class="cleansia-pay-config-form__content"
    >
      <!-- Service / Package Selection (only for create) -->
      @if (!isEditMode()) {
      <cleansia-section [title]="'pages.pay_config_form.assignment' | translate">
        <div class="form-grid">
          <div class="form-field">
            <label>{{ 'pages.pay_config_form.service' | translate }}</label>
            <select formControlName="serviceId" class="form-select">
              <option value="">{{ 'pages.pay_config_form.select_service' | translate }}</option>
              @for (service of facade.services(); track service.id) {
              <option [value]="service.id">{{ service.name }}</option>
              }
            </select>
          </div>

          <div class="form-field">
            <label>{{ 'pages.pay_config_form.package' | translate }}</label>
            <select formControlName="packageId" class="form-select">
              <option value="">{{ 'pages.pay_config_form.select_package' | translate }}</option>
              @for (pkg of facade.packages(); track pkg.id) {
              <option [value]="pkg.id">{{ pkg.name }}</option>
              }
            </select>
          </div>
        </div>
        <p class="form-hint">{{ 'pages.pay_config_form.service_or_package_hint' | translate }}</p>
      </cleansia-section>
      }

      <!-- Currency (only for create) -->
      @if (!isEditMode()) {
      <cleansia-section [title]="'pages.pay_config_form.currency_section' | translate">
        <div class="form-grid">
          <div class="form-field">
            <label>{{ 'pages.pay_config_form.currency' | translate }}</label>
            <select formControlName="currencyId" class="form-select">
              <option value="">{{ 'pages.pay_config_form.select_currency' | translate }}</option>
              @for (currency of facade.currencies(); track currency.id) {
              <option [value]="currency.id">{{ currency.code }}</option>
              }
            </select>
          </div>
        </div>
      </cleansia-section>
      }

      <!-- Grade Template -->
      <cleansia-section [title]="'pages.pay_config_form.grade_template' | translate">
        <div class="form-grid">
          <div class="form-field">
            <label>{{ 'pages.pay_config_form.apply_grade' | translate }}</label>
            <div class="grade-row">
              <select formControlName="gradeLevel" class="form-select">
                <option value="">{{ 'pages.pay_config_form.select_grade' | translate }}</option>
                @for (grade of gradeOptions; track grade.value) {
                <option [value]="grade.value">{{ grade.label }}</option>
                }
              </select>
              <cleansia-button
                [label]="'pages.pay_config_form.apply' | translate"
                icon="pi pi-check"
                severity="secondary"
                [outlined]="true"
                (onClick)="applyGrade()"
              />
            </div>
            <p class="form-hint">{{ 'pages.pay_config_form.grade_hint' | translate }}</p>
          </div>
        </div>
      </cleansia-section>

      <!-- Pay Rates -->
      <cleansia-section [title]="'pages.pay_config_form.pay_rates' | translate">
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.base_pay' | translate"
              formControlName="basePay"
              dataType="number"
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.extra_per_room' | translate"
              formControlName="extraPerRoom"
              dataType="number"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.extra_per_bathroom' | translate"
              formControlName="extraPerBathroom"
              dataType="number"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.distance_rate' | translate"
              formControlName="distanceRatePerKm"
              dataType="number"
            />
          </div>
        </div>
      </cleansia-section>

      <!-- Pay Limits -->
      <cleansia-section [title]="'pages.pay_config_form.pay_limits' | translate">
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.minimum_pay' | translate"
              formControlName="minimumPay"
              dataType="number"
            />
          </div>

          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.maximum_pay' | translate"
              formControlName="maximumPay"
              dataType="number"
            />
          </div>
        </div>
      </cleansia-section>

      <!-- Description -->
      <cleansia-section [title]="'pages.pay_config_form.description_section' | translate">
        <div class="form-grid">
          <div class="form-field full-width">
            <cleansia-textarea
              [label]="'pages.pay_config_form.description' | translate"
              formControlName="description"
              [rows]="3"
            />
          </div>
        </div>
      </cleansia-section>

      <div class="form-actions">
        <cleansia-button
          [label]="'global.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="
            isEditMode()
              ? ('global.actions.save' | translate)
              : ('global.actions.create' | translate)
          "
          type="submit"
          [disabled]="facade.saving()"
          [loading]="facade.saving()"
          (onClick)="onSave()"
        />
      </div>
    </form>
    }
  </div>
</div>
