<div class="cleansia-pay-config-form">
  <div class="cleansia-pay-config-form__container page-wrapper">
    <!-- Header with Back Button -->
    <div class="cleansia-pay-config-form__header">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        (onClick)="onCancel()"
        [outlined]="true"
      />
      <cleansia-title [title]="pageTitle()" />
      @if (isEditMode()) {
      <cleansia-button
        *cleansiaPermission="Policy.CanViewAuditLog"
        class="cleansia-pay-config-form__audit-link"
        icon="pi pi-history"
        severity="secondary"
        [outlined]="true"
        [label]="'pages.audit_log.drill_in.view_history' | translate"
        (onClick)="viewAuditHistory()"
      />
      }
    </div>

    @if (facade.loading()) {
    <cleansia-loader />
    } @else {
    <form
      [formGroup]="form"
      (ngSubmit)="onSave()"
      class="cleansia-pay-config-form__content"
    >
      <!-- Target Assignment (create only) -->
      @if (!isEditMode()) {
      <cleansia-section
        [title]="'pages.pay_config_form.target' | translate"
      >
        <div class="form-grid">
          <div class="form-field">
            <cleansia-select
              [options]="serviceOptions()"
              [label]="'pages.pay_config_form.service' | translate"
              [floatVariant]="'on'"
              [filter]="true"
              formControlName="serviceId"
            />
          </div>
          <div class="form-field">
            <cleansia-select
              [options]="packageOptions()"
              [label]="'pages.pay_config_form.package' | translate"
              [floatVariant]="'on'"
              [filter]="true"
              formControlName="packageId"
            />
          </div>
          <div class="form-field">
            <cleansia-select
              [options]="currencyOptions()"
              [label]="'pages.pay_config_form.currency' | translate"
              [floatVariant]="'on'"
              formControlName="currencyId"
            />
          </div>
        </div>
        <p class="form-hint">
          {{ 'pages.pay_config_form.target_hint' | translate }}
        </p>
      </cleansia-section>
      }

      <!-- Pay Rates -->
      <cleansia-section
        [title]="'pages.pay_config_form.pay_rates' | translate"
      >
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.base_pay' | translate"
              formControlName="basePay"
              dataType="number"
              [required]="true"
            />
          </div>
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.extra_per_room' | translate"
              formControlName="extraPerRoom"
              dataType="number"
            />
          </div>
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.extra_per_bathroom' | translate"
              formControlName="extraPerBathroom"
              dataType="number"
            />
          </div>
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.distance_rate' | translate"
              formControlName="distanceRatePerKm"
              dataType="number"
            />
          </div>
        </div>
      </cleansia-section>

      <!-- Pay Limits -->
      <cleansia-section
        [title]="'pages.pay_config_form.pay_limits' | translate"
      >
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.minimum_pay' | translate"
              formControlName="minimumPay"
              dataType="number"
            />
          </div>
          <div class="form-field">
            <cleansia-text-input
              [label]="'pages.pay_config_form.maximum_pay' | translate"
              formControlName="maximumPay"
              dataType="number"
            />
          </div>
        </div>
        <p class="form-hint">
          {{ 'pages.pay_config_form.pay_limits_hint' | translate }}
        </p>
      </cleansia-section>

      <!-- Description -->
      <cleansia-section
        [title]="'pages.pay_config_form.description_section' | translate"
      >
        <div class="form-grid">
          <div class="form-field full-width">
            <cleansia-textarea
              [label]="'pages.pay_config_form.description' | translate"
              formControlName="description"
              [rows]="3"
            />
          </div>
        </div>
      </cleansia-section>

      <!-- Form Actions -->
      <div class="form-actions">
        <cleansia-button
          [label]="'global.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="
            isEditMode()
              ? ('global.actions.save' | translate)
              : ('global.actions.create' | translate)
          "
          type="submit"
          [disabled]="facade.saving()"
          [loading]="facade.saving()"
          (onClick)="onSave()"
        />
      </div>
    </form>
    }
  </div>
</div>
