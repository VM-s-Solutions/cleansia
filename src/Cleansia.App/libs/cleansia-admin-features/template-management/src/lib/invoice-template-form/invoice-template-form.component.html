<div class="cleansia-invoice-template-form">
  <cleansia-language-switcher />
  <div class="cleansia-invoice-template-form__container page-wrapper">
    <!-- Header with Back Button -->
    <div class="cleansia-invoice-template-form__header">
      <cleansia-button
        [label]="'global.actions.back' | translate"
        icon="pi pi-arrow-left"
        (onClick)="onCancel()"
        [outlined]="true"
      />
      <cleansia-title [title]="pageTitle()" />
    </div>

    @if (facade.loading()) {
    <cleansia-loader />
    } @else {
    <form
      [formGroup]="form"
      (ngSubmit)="onSave()"
      class="cleansia-invoice-template-form__content"
    >
      <cleansia-section
        [title]="'pages.template_management.sections.basic_info' | translate"
      >
        <div class="form-grid">
          <div class="form-field">
            <cleansia-text-input
              formControlName="templateName"
              [label]="
                'pages.template_management.fields.template_name' | translate
              "
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-select
              formControlName="countryId"
              [label]="'pages.template_management.fields.country' | translate"
              [options]="countryOptions()"
              [required]="true"
            />
          </div>

          <div class="form-field">
            <cleansia-select
              formControlName="languageId"
              [label]="'pages.template_management.fields.language' | translate"
              [options]="languageOptions()"
              [required]="true"
            />
          </div>

          <div class="form-field full-width">
            <cleansia-textarea
              formControlName="description"
              [label]="
                'pages.template_management.fields.description' | translate
              "
              [rows]="3"
            />
          </div>
        </div>
      </cleansia-section>

      <cleansia-section
        [title]="'pages.template_management.sections.template_file' | translate"
      >
        @if (isEditMode() && currentFileName()) {
        <div class="current-file-info">
          <div class="current-file-details">
            <div class="file-icon">
              <i class="pi pi-file"></i>
            </div>
            <div class="file-meta">
              <span class="file-name">{{ currentFileName() }}</span>
              <span class="file-version"
                >{{
                  'pages.template_management.current_file.version' | translate
                }}: {{ currentVersion() }}</span
              >
            </div>
          </div>
          <div class="current-file-actions">
            <cleansia-button
              [label]="
                'pages.template_management.current_file.download' | translate
              "
              icon="pi pi-download"
              [outlined]="true"
              (onClick)="downloadCurrentFile()"
            />
            <cleansia-button
              [label]="
                'pages.template_management.current_file.open_new_tab'
                  | translate
              "
              icon="pi pi-external-link"
              [outlined]="true"
              (onClick)="openInNewTab()"
            />
          </div>
        </div>
        }

        <div class="form-grid">
          <div class="form-field full-width">
            <cleansia-file
              formControlName="templateFile"
              [label]="
                isEditMode()
                  ? ('pages.template_management.fields.replace_file'
                    | translate)
                  : ('pages.template_management.fields.template_file'
                    | translate)
              "
              [multiple]="false"
              accept=".html,.htm"
              [maxFileSize]="5242880"
              [required]="!isEditMode()"
            />
          </div>
        </div>
      </cleansia-section>

      <div class="form-actions">
        <cleansia-button
          [label]="'global.actions.cancel' | translate"
          [outlined]="true"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="
            isEditMode()
              ? ('global.actions.save' | translate)
              : ('global.actions.create' | translate)
          "
          type="submit"
          [disabled]="facade.saving()"
          [loading]="facade.saving()"
          (onClick)="onSave()"
        />
      </div>
    </form>
    }
  </div>
</div>
