<div class="cleansia-template-list page-wrapper">
  <div class="filter-header">
    <div class="filter-chips-inline"></div>
    <div class="header-actions">
      <cleansia-button
        [label]="'pages.template_management.create_template' | translate"
        icon="pi pi-plus"
        (onClick)="facade.navigateToCreate()"
      />
    </div>
  </div>

  <cleansia-section>
    @if (facade.loading() && facade.templates().length === 0) {
    <cleansia-loader />
    } @else {
    <cleansia-table
      [data]="facade.templates()"
      [columns]="columns"
      [actions]="actions"
      [config]="{ paginator: true, rows: 20, emptyMessage: 'pages.template_management.no_templates' }"
      [loading]="facade.loading()"
      (sortChange)="onSortChange($event)"
    >
    </cleansia-table>
    }
  </cleansia-section>
</div>

<p-confirmDialog />

<!-- Status Template -->
<ng-template #statusTemplate let-item>
  <div class="status-cell">
    <span [class]="getActiveStatusClass(item)">
      {{ getActiveStatusLabel(item) }}
    </span>
  </div>
</ng-template>
