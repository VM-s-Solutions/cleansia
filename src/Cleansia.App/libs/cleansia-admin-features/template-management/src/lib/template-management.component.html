<div class="cleansia-template-management">
  <cleansia-language-switcher />
  <div class="cleansia-template-management__container">
    <div class="cleansia-template-management__header">
      <div class="header-content">
        <cleansia-title
          [title]="'pages.template_management.title' | translate"
        />
        <p class="cleansia-template-management__description">
          {{ 'pages.template_management.description' | translate }}
        </p>
      </div>
    </div>

    <div class="tabs-container">
      <p-tabs [value]="activeTabIndex()" (valueChange)="onTabChange($event)">
        <p-tablist>
          @for (tab of tabs; track tab.route; let i = $index) {
          <p-tab [value]="i">
            <i [class]="tab.icon"></i>
            <span>{{ tab.label }}</span>
          </p-tab>
          }
        </p-tablist>
      </p-tabs>
    </div>

    <div class="tab-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
