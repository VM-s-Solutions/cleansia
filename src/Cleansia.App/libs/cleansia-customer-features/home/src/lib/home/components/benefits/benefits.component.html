<section class="cl-section cl-section--benefits" id="benefits">
  <div class="cl-section__inner">
    <div class="cl-benefits">
      <div class="cl-benefits__image animate-on-scroll from-left">
        <img src="assets/images/mascot/mascot-idea.png" alt="Cleaning illustration" loading="lazy" />
      </div>
      <div class="cl-benefits__content">
        <div class="cl-section__header cl-section__header--left animate-on-scroll">
          <span class="cl-section__badge">{{ 'pages.home.benefits.badge' | translate }}</span>
          <h2 class="cl-title cl-title--left">{{ 'pages.home.benefits.title' | translate }}</h2>
        </div>
        <div class="cl-benefits__grid">
          <div class="cl-benefits__card animate-on-scroll delay-1">
            <div class="cl-benefits__card-num">01</div>
            <div class="cl-benefits__card-body">
              <p class="cl-benefits__card-text">{{ 'pages.home.benefits.b1' | translate }}</p>
            </div>
          </div>
          <div class="cl-benefits__card animate-on-scroll delay-2">
            <div class="cl-benefits__card-num">02</div>
            <div class="cl-benefits__card-body">
              <p class="cl-benefits__card-text">{{ 'pages.home.benefits.b2' | translate }}</p>
            </div>
          </div>
          <div class="cl-benefits__card animate-on-scroll delay-3">
            <div class="cl-benefits__card-num">03</div>
            <div class="cl-benefits__card-body">
              <p class="cl-benefits__card-text">{{ 'pages.home.benefits.b3' | translate }}</p>
            </div>
          </div>
          <div class="cl-benefits__card animate-on-scroll delay-4">
            <div class="cl-benefits__card-num">04</div>
            <div class="cl-benefits__card-body">
              <p class="cl-benefits__card-text">{{ 'pages.home.benefits.b4' | translate }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
