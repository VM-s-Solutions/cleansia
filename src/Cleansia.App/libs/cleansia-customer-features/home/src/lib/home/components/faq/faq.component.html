<section class="cl-section cl-section--faq" id="faq">
  <div class="cl-section__inner">
    <div class="cl-faq-layout">
      <div class="cl-faq-layout__left animate-on-scroll">
        <span class="cl-section__badge">{{ 'pages.home.faq.badge' | translate }}</span>
        <h2 class="cl-title cl-title--left">{{ 'pages.home.faq.title' | translate }}</h2>
        <p class="cl-faq-layout__desc">{{ 'pages.home.faq.desc' | translate }}</p>
        <a href="mailto:info&#64;cleansia.cz" class="text-decoration-none">
          <button pButton type="button" icon="pi pi-envelope" class="cl-btn-primary cl-faq-layout__cta" [label]="'pages.home.faq.contact_button' | translate"></button>
        </a>
      </div>
      <div class="cl-faq-layout__right animate-on-scroll delay-1">
        <p-accordion>
          @for (faq of faqs; track faq.question; let i = $index) {
          <p-accordion-panel [value]="i">
            <p-accordion-header>{{ faq.question | translate }}</p-accordion-header>
            <p-accordion-content>
              <p class="cl-faq__answer">{{ faq.answer | translate }}</p>
            </p-accordion-content>
          </p-accordion-panel>
          }
        </p-accordion>
      </div>
    </div>
  </div>
</section>
