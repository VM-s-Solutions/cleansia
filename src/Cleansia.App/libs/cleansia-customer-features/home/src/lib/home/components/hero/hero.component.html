<section class="cl-hero" id="hero">
  <div class="cl-hero__bubble cl-hero__bubble--1" aria-hidden="true"></div>
  <div class="cl-hero__bubble cl-hero__bubble--2" aria-hidden="true"></div>
  <div class="cl-hero__bubble cl-hero__bubble--3" aria-hidden="true"></div>
  <div class="cl-hero__bubble cl-hero__bubble--4" aria-hidden="true"></div>
  <div class="cl-hero__inner">
    <div class="cl-hero__text animate-on-scroll">
      <p class="cl-hero__tagline">
        <i class="pi pi-sparkles"></i>
        {{ 'pages.home.hero.tagline' | translate }}
      </p>
      <h1 class="cl-title cl-title--hero">
        {{ 'pages.home.hero.title' | translate }}
      </h1>
      <p class="cl-hero__subtitle">
        {{ 'pages.home.hero.subtitle' | translate }}
      </p>
      <div class="cl-hero__buttons">
        <a routerLink="/order" class="text-decoration-none">
          <button pButton type="button" class="p-button-lg cl-btn-primary">
            {{ 'pages.home.hero.book_now' | translate }}
          </button>
        </a>
        <a routerLink="/services" class="text-decoration-none">
          <button pButton type="button" class="p-button-lg cl-btn-outline">
            {{ 'pages.home.hero.view_services' | translate }}
          </button>
        </a>
      </div>
      <div class="cl-hero__trust">
        <div class="cl-hero__trust-item">
          <i class="pi pi-verified"></i>
          <span>{{ 'pages.home.hero.badge_certified' | translate }}</span>
        </div>
        <div class="cl-hero__trust-item">
          <i class="pi pi-star-fill"></i>
          <span>{{ 'pages.home.hero.badge_rating' | translate }}</span>
        </div>
        <div class="cl-hero__trust-item">
          <i class="pi pi-users"></i>
          <span>{{ 'pages.home.hero.badge_customers' | translate }}</span>
        </div>
      </div>
    </div>
    <div class="cl-hero__image animate-on-scroll delay-1">
      <img
        src="assets/images/mascot/mascot-mopping.webp"
        srcset="assets/images/mascot/mascot-mopping-480.webp 480w, assets/images/mascot/mascot-mopping.webp 800w"
        sizes="(max-width: 768px) 260px, 400px"
        alt="Cleaning mascot"
        width="800"
        height="800"
        loading="eager"
        fetchpriority="high"
      />
    </div>
  </div>
  <div class="cl-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 100" preserveAspectRatio="none">
      <path d="M0,40 C280,100 720,0 1440,60 L1440,100 L0,100 Z" />
    </svg>
  </div>
</section>
