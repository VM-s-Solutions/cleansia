<section class="legal-page__hero">
  <div class="legal-page__hero-bubble legal-page__hero-bubble--1" aria-hidden="true"></div>
  <div class="legal-page__hero-bubble legal-page__hero-bubble--2" aria-hidden="true"></div>
  <div class="legal-page__hero-inner">
    <h1 class="legal-page__title">{{ 'privacy_page.title' | translate }}</h1>
    <p class="legal-page__intro">{{ 'privacy_page.intro' | translate }}</p>
  </div>
  <div class="legal-page__hero-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 100" preserveAspectRatio="none">
      <path d="M0,40 C280,100 720,0 1440,60 L1440,100 L0,100 Z" />
    </svg>
  </div>
</section>

<div class="legal-page">
  @for (i of sections; track i) {
    <div class="legal-page__section">
      <h2 class="legal-page__section-title">{{ 'privacy_page.section' + i + '_title' | translate }}</h2>
      <p class="legal-page__section-text">{{ 'privacy_page.section' + i + '_text' | translate }}</p>
    </div>
  }
</div>
