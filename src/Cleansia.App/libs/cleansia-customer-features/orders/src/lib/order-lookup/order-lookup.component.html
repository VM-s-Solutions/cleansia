<!-- Hero band — same visual language as the track-order page (shared styles) -->
<section class="track-order__hero">
  <div class="track-order__hero-bubble track-order__hero-bubble--1" aria-hidden="true"></div>
  <div class="track-order__hero-bubble track-order__hero-bubble--2" aria-hidden="true"></div>
  <div class="track-order__hero-bubble track-order__hero-bubble--3" aria-hidden="true"></div>
  <div class="track-order__hero-inner">
    <h1 class="track-order__title">{{ 'pages.order_lookup.title' | translate }}</h1>
    <p class="track-order__subtitle">{{ 'pages.order_lookup.subtitle' | translate }}</p>
  </div>
  <div class="track-order__hero-wave" aria-hidden="true">
    <svg viewBox="0 0 1440 100" preserveAspectRatio="none">
      <path d="M0,40 C280,100 720,0 1440,60 L1440,100 L0,100 Z" />
    </svg>
  </div>
</section>

<div class="track-order">
  <div class="track-order__form-card">
    <div class="track-order__form">
      <div class="track-order__field">
        <label>{{ 'pages.order_lookup.confirmation_code' | translate }}</label>
        <div class="track-order__input-wrap">
          <i class="pi pi-tag"></i>
          <input
            type="text"
            [ngModel]="confirmationCode()"
            (ngModelChange)="confirmationCode.set($event)"
            (keyup.enter)="submit()"
            autocomplete="off"
          />
        </div>
      </div>
      <div class="track-order__field">
        <label>{{ 'pages.order_lookup.email' | translate }}</label>
        <div class="track-order__input-wrap">
          <i class="pi pi-envelope"></i>
          <input
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            (keyup.enter)="submit()"
            autocomplete="email"
          />
        </div>
      </div>
      <cleansia-button
        [title]="'pages.order_lookup.submit' | translate"
        [severity]="'primary'"
        [icon]="'pi pi-search'"
        [loading]="loading()"
        [disabled]="!confirmationCode().trim() || !email().trim()"
        (clickFn)="submit()"
      />
    </div>
  </div>

  @if (notFound()) {
    <div class="track-order__error">
      <i class="pi pi-info-circle"></i>
      <div>
        <p>{{ 'pages.order_lookup.not_found' | translate }}</p>
      </div>
    </div>
  }
</div>
<cleansia-scroll-top [ariaLabel]="'global.scroll_to_top' | translate" />
