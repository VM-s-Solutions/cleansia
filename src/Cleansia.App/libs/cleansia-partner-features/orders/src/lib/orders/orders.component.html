<div class="cleansia-orders">
  <cleansia-language-switcher />
  <div class="cleansia-orders__container">
    <div class="cleansia-orders__header">
      <cleansia-title [title]="'pages.orders.title' | translate" />
      <p class="cleansia-orders__description">
        {{ 'pages.orders.description' | translate }}
      </p>
    </div>

    <!-- Active Orders Section -->
    <cleansia-section [title]="'pages.orders.active_orders' | translate">
      @if (facade.loading$ | async) {
      <cleansia-loader />
      } @else {
      <cleansia-table
        [data]="facade.orders()"
        [tableDefinition]="ordersTableDefinition"
        [paginator]="true"
        [rows]="10"
        [emptyMessage]="'pages.orders.no_orders'"
        tableClass="cleansia-orders__table"
      >
      </cleansia-table>
      }
    </cleansia-section>
  </div>
</div>

<ng-template #statusTemplate let-item>
  <span [class]="getStatusClass(item)">
    {{ item.paymentStatus?.name }}
  </span>
</ng-template>

<ng-template #orderStatusTemplate let-item>
  <span [class]="getOrderStatusClass(item)">
    {{ item.orderStatus?.name }}
  </span>
</ng-template>
