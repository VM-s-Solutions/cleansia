@if(facade.profileLoading()){
<cleansia-form-skeleton />
} @else {
<div class="cleansia-profile">
  <form
    class="cleansia-profile__form-card page-wrapper"
    [formGroup]="facade.formGroup"
  >
    <div class="cleansia-profile__header">
      <cleansia-title [title]="'pages.profile.title' | translate" />
      <p class="cleansia-profile__description">
        {{ 'pages.profile.description' | translate }}
      </p>
    </div>

    <!-- Personal Information Section -->
    <cleansia-profile-personal-info [facade]="facade" />

    <!-- Bank Details Section -->
    <cleansia-profile-bank-details [facade]="facade" />

    <!-- Emergency Contact Section -->
    <cleansia-profile-emergency-contact [facade]="facade" />

    <!-- Employee Documents Management Section -->
    <cleansia-profile-documents [facade]="facade.documentsFacade" />

    <!-- Availability Section -->
    <cleansia-profile-availability [facade]="facade" />

    <!-- Consent Section -->
    <div class="cleansia-profile__consent">
      <cleansia-checkbox
        [title]="'pages.profile.consent' | translate"
        formControlName="consent"
        [required]="true"
        [showErrors]="false"
      />
      <span
        class="cleansia-profile__consent-text"
        [innerHtml]="'pages.profile.consent_text' | translate"
      ></span>
    </div>

    <!-- Submit Button -->
    <div class="cleansia-profile__actions">
      <cleansia-button
        [buttonType]="'submit'"
        [style]="'raised-button'"
        [title]="'pages.profile.submit' | translate"
        (clickFn)="facade.onSubmit()"
        [loading]="facade.profileSubmitLoading()"
      />
    </div>
  </form>
</div>
}
