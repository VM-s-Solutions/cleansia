<div
  class="cleansia-brand-name"
  [ngClass]="{
    'cleansia-brand-name__wrapped': wrapped(),
    'cleansia-brand-name--hide-name': !showName()
  }"
>
  <a [routerLink]="'/' + defaultRoute()">
    <picture>
      <source srcset="assets/logos/Logo.webp" type="image/webp" />
      <img
        src="assets/logos/Logo.webp"
        alt="Cleansia logo"
        width="32"
        height="32"
        loading="lazy"
        decoding="async"
      />
    </picture>
    <h2>Cleansia</h2>
  </a>
</div>
