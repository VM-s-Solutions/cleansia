<p-button
  [class]="
    size() +
    ' cleansia-button ' +
    'cleansia-button--' +
    buttonSize() +
    (isIconOnly() ? ' cleansia-button--icon-only' : '') +
    ' ' +
    className()
  "
  [label]="label() || title()"
  [icon]="icon()"
  [iconPos]="iconPosition()"
  [loading]="loading()"
  [disabled]="disabled()"
  [severity]="severity()"
  [raised]="style() === 'raised-button'"
  [outlined]="outlined()"
  [rounded]="rounded() || isIconOnly()"
  [text]="text()"
  [type]="buttonType()"
  [pTooltip]="tooltip()"
  [tooltipPosition]="tooltipPosition()"
  (onClick)="handleClick($event)"
/>
