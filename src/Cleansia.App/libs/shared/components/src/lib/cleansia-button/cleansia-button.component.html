<p-button
  [class]="size() + ' cleansia-button ' + className()"
  [label]="title()"
  [icon]="icon()"
  [iconPos]="iconPosition()"
  [loading]="loading()"
  [disabled]="disabled()"
  [severity]="severity()"
  [raised]="style() === 'raised-button'"
  [rounded]="rounded()"
  [type]="buttonType()"
  (onClick)="handleClick($event)"
/>
