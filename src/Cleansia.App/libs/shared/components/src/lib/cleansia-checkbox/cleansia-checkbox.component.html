<div class="cleansia-checkbox-container">
  <div class="cleansia-checkbox-wrapper">
    <p-checkbox
      [id]="id()"
      [(ngModel)]="innerValue"
      (ngModelChange)="handleChange($event)"
      (onBlur)="onTouch()"
      [binary]="binary()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [ngClass]="className() ?? ''"
      [ngClass]="{
        'p-invalid':
          showErrors() &&
          formControl.invalid &&
          (formControl.dirty || formControl.touched)
      }"
    />
    @if (label()) {
    <label [for]="id()" [class.required]="isRequired() && showRequired()">{{
      label()
    }}</label>
    }
  </div>
  @if (showErrors() && formControl.invalid && (formControl.dirty ||
  formControl.touched)) {
  <ul class="cleansia-error-message-container">
    @for (error of formControl.errors | error; track $index) {
    <li>{{ error }}</li>
    }
  </ul>
  }
</div>
