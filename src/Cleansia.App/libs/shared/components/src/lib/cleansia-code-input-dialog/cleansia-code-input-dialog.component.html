<p-dialog
  [header]="titleKey() | translate"
  [(visible)]="dialogVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '440px' }"
  [breakpoints]="{ '500px': '92vw' }"
  styleClass="cleansia-dialog cleansia-code-input-dialog"
  (onHide)="handleHide()"
>
  <div class="cleansia-code-input-dialog__body">
    <p-floatlabel variant="on" class="cleansia-code-input-dialog__field">
      <input
        pInputText
        id="cleansia-code-input-dialog-input"
        [(ngModel)]="codeInput"
        autocomplete="off"
        spellcheck="false"
        class="cleansia-code-input-dialog__input"
        [disabled]="state().kind === 'valid'"
        (keydown.enter)="onApply()"
      />
      <label for="cleansia-code-input-dialog-input">
        {{ inputLabelKey() | translate }}
      </label>
    </p-floatlabel>

    <p class="cleansia-code-input-dialog__helper">
      {{ helperKey() | translate }}
    </p>

    @switch (state().kind) {
      @case ('validating') {
        <div class="cleansia-code-input-dialog__status cleansia-code-input-dialog__status--neutral">
          <i class="pi pi-spin pi-spinner"></i>
          <span>{{ validatingKey() | translate }}</span>
        </div>
      }
      @case ('valid') {
        <div class="cleansia-code-input-dialog__status cleansia-code-input-dialog__status--success">
          <i class="pi pi-check-circle"></i>
          <span>{{ asValid().successMessage }}</span>
        </div>
      }
      @case ('invalid') {
        <div class="cleansia-code-input-dialog__status cleansia-code-input-dialog__status--error">
          <i class="pi pi-times-circle"></i>
          <span>{{ asInvalid().errorMessage }}</span>
        </div>
      }
    }
  </div>

  <ng-template pTemplate="footer">
    <div class="cleansia-code-input-dialog__footer">
      @if (state().kind === 'valid') {
        <cleansia-button
          [label]="doneKey() | translate"
          severity="primary"
          (onClick)="onDone()"
        />
      } @else {
        <cleansia-button
          [label]="cancelKey() | translate"
          [text]="true"
          severity="secondary"
          (onClick)="onCancel()"
        />
        <cleansia-button
          [label]="applyKey() | translate"
          severity="primary"
          [disabled]="!canApply()"
          [loading]="state().kind === 'validating'"
          (onClick)="onApply()"
        />
      }
    </div>
  </ng-template>
</p-dialog>
