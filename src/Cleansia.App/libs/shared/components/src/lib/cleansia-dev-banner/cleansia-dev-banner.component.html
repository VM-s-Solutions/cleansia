@if (bugReportUrl) {
  <div class="cleansia-dev-banner">
    <span class="cleansia-dev-banner__env">DEV</span>
    <span class="cleansia-dev-banner__text">Testing environment</span>
    <a
      class="cleansia-dev-banner__link"
      [href]="bugReportUrl"
      target="_blank"
      rel="noopener noreferrer"
    >

      Report a Bug
    </a>
  </div>
}
