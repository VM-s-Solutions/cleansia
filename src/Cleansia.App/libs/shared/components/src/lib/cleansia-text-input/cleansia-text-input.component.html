@if (floatVariant(); as variant) {
<p-floatlabel [variant]="variant">
  @if (label()) {
  <label [for]="id()" [class.required]="isRequired() && showRequired()">{{
    label()
  }}</label>
  }
  <input
    pInputText
    [id]="id()"
    [type]="dataType()"
    [value]="innerValue"
    (input)="handleChange($event)"
    (blur)="onTouch()"
    [disabled]="disabled()"
    [readonly]="readonlyInput()"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [ngClass]="{
      'p-invalid':
        formControl.invalid && (formControl.dirty || formControl.touched)
    }"
    [class]="inputSize() + ' ' + (className() ?? '')"
  />
</p-floatlabel>
} @else { @if (label()) {
<label [for]="id()" [class.required]="isRequired() && showRequired()">{{
  label()
}}</label>
}
<input
  pInputText
  [id]="id()"
  [type]="dataType()"
  [value]="innerValue"
  (input)="handleChange($event)"
  (blur)="onTouch()"
  [disabled]="disabled()"
  [readonly]="readonlyInput()"
  [placeholder]="placeholder()"
  [autocomplete]="autocomplete()"
  [class]="className() ?? ''"
  [ngClass]="{
    'p-invalid':
      formControl.invalid && (formControl.dirty || formControl.touched)
  }"
  [class]="inputSize() + ' ' + (className() ?? '')"
/>
} @if (showErrors() && formControl.invalid && (formControl.dirty ||
formControl.touched)) {
<ul class="cleansia-error-message-container">
  @for (error of formControl.errors | error; track $index) {
  <li>{{ error }}</li>
  }
</ul>
}
