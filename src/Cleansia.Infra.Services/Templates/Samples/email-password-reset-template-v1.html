<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{Subject}}</title>
  <style>
    /* ---------- Base Styles ---------- */
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }

    /* ---------- Container ---------- */
    #email-wrapper {
      max-width: 480px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    /* ---------- Header ---------- */
    .header {
      padding: 28px 30px 20px;
      text-align: center;
      border-bottom: 1px solid #e6e6e6;
      background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
    }
    .header h1 {
      font-size: 26px;
      color: #ffffff;
      margin: 0;
      letter-spacing: 1px;
    }

    /* ---------- Content ---------- */
    .content {
      padding: 36px 30px 10px;
      text-align: center;
    }
    .content h2 {
      margin: 0 0 12px;
      font-size: 20px;
      color: #0284c7;
    }
    .content p {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #666;
    }
    .content strong {
      color: #0284c7;
    }

    /* ---------- Verification Code Box ---------- */
    .code-box {
      background: #e0f2fe;
      border: 1px dashed #0284c7;
      border-radius: 8px;
      padding: 20px;
      margin: 26px 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0369a1;
    }

    /* ---------- Call to Action Button ---------- */
    .cta {
      margin: 30px 0;
    }
    .cta a {
      display: inline-block;
      background: #0284c7;
      color: #ffffff !important;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(2, 132, 199, .25);
      transition: background .2s;
    }
    .cta a:hover {
      background: #0369a1;
    }

    /* ---------- Footer ---------- */
    .footer {
      padding: 22px 30px;
      text-align: center;
      font-size: 12px;
      color: #999;
      background: #fafafa;
    }
    .footer a {
      color: #0284c7;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* ---------- Mobile Styles ---------- */
    @media screen and (max-width: 480px) {
      body { background: #fff; }
      #email-wrapper {
        margin: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .content,
      .header,
      .footer {
        padding-left: 20px;
        padding-right: 20px;
      }
      .code-box {
        font-size: 22px;
      }
      .cta a {
        padding: 12px 24px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div id="email-wrapper">

    <!-- Header -->
    <div class="header">
      <h1>{{Title}}</h1>
    </div>

    <!-- Main Content -->
    <div class="content">
      <h2>{{Header}}</h2>
      <p>{{GreetingWord}}, <strong>{{UserName}}</strong>!</p>
      <p>{{Instruction}}</p>

      <!-- Verification Code -->
      <div class="code-box">
        {{VerificationCode}}
      </div>

      <p>{{CodeNote}}</p>

      <!-- Button -->
      <div class="cta">
        <a href="{{ResetPasswordLink}}">{{ButtonText}}</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      {{Footer}} <a href="mailto:{{SupportEmail}}">{{SupportEmail}}</a>
    </div>

  </div>
</body>
</html>
