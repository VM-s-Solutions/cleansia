# Unified Android version catalog for the cleansia_android_shared monorepo.
#
# Started from the customer app's catalog (it has the broader dependency set —
# Firebase, Mapbox, Stripe, Sentry, Credential Manager, etc.) and added the
# partner-specific entries it didn't have (Room, biometric, Lottie, splashscreen,
# the legacy espresso testing kit). Naming follows customer's conventions
# (camelCase keys) so every existing import in customer-app keeps resolving.
#
# When in doubt, add to this catalog rather than declaring inline in a module —
# the whole point is one place for every version.

[versions]
agp = "8.13.2"
kotlin = "2.1.10"
ksp = "2.1.10-1.0.31"
hilt = "2.54"
hiltNavigation = "1.2.0"
composeBom = "2025.02.00"
activityCompose = "1.10.0"
navigation = "2.8.7"
coroutines = "1.10.1"
serialization = "1.7.3"
kotlinxDatetime = "0.6.1"
retrofit = "2.11.0"
okhttp = "4.12.0"
coil = "3.0.4"
datastore = "1.1.1"
securityCrypto = "1.1.0-alpha06"
splashScreen = "1.0.1"
lifecycle = "2.8.7"
androidxCore = "1.15.0"
appcompat = "1.7.0"
mapbox = "11.8.0"
mapboxCompose = "11.8.0"
playServicesLocation = "21.2.0"
spotless = "6.25.0"
ktlint = "1.3.1"
openapiGenerator = "7.10.0"
sentry = "7.22.3"
stripe = "21.2.0"
mockk = "1.13.13"
turbine = "1.1.0"
firebaseBom = "33.7.0"
googleServices = "4.4.2"
credentials = "1.3.0"
googleid = "1.1.1"
# Partner-only additions (Room database, biometric auth, splashscreen, Lottie, legacy espresso).
room = "2.6.1"
biometric = "1.2.0-alpha05"
lottie = "6.6.2"
desugarJdkLibs = "2.1.4"
espressoCore = "3.6.1"
androidxJunit = "1.2.1"
# Phone-number formatting/validation across all supported regions. Used by
# the shared CleansiaPhoneInput; partner+customer both need format-as-you-type.
libphonenumber = "8.13.50"

[libraries]
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "appcompat" }
androidx-splashscreen = { module = "androidx.core:core-splashscreen", version.ref = "splashScreen" }
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
androidx-lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-compose = { module = "androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "lifecycle" }
androidx-lifecycle-runtime-compose = { module = "androidx.lifecycle:lifecycle-runtime-compose", version.ref = "lifecycle" }

compose-bom = { module = "androidx.compose:compose-bom", version.ref = "composeBom" }
compose-ui = { module = "androidx.compose.ui:ui" }
compose-ui-graphics = { module = "androidx.compose.ui:ui-graphics" }
compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
compose-ui-text-google-fonts = { module = "androidx.compose.ui:ui-text-google-fonts" }
compose-material3 = { module = "androidx.compose.material3:material3" }
compose-material-icons = { module = "androidx.compose.material:material-icons-extended" }
compose-foundation = { module = "androidx.compose.foundation:foundation" }

# Partner-app aliases (kept so partner build files don't have to change names).
androidx-compose-bom = { module = "androidx.compose:compose-bom", version.ref = "composeBom" }
androidx-ui = { module = "androidx.compose.ui:ui" }
androidx-ui-graphics = { module = "androidx.compose.ui:ui-graphics" }
androidx-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
androidx-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
androidx-ui-test-manifest = { module = "androidx.compose.ui:ui-test-manifest" }
androidx-ui-test-junit4 = { module = "androidx.compose.ui:ui-test-junit4" }
androidx-material3 = { module = "androidx.compose.material3:material3" }
androidx-material-icons-extended = { module = "androidx.compose.material:material-icons-extended" }

androidx-navigation-compose = { module = "androidx.navigation:navigation-compose", version.ref = "navigation" }

hilt-android = { module = "com.google.dagger:hilt-android", version.ref = "hilt" }
hilt-android-compiler = { module = "com.google.dagger:hilt-android-compiler", version.ref = "hilt" }
hilt-compiler = { module = "com.google.dagger:hilt-android-compiler", version.ref = "hilt" }
hilt-navigation-compose = { module = "androidx.hilt:hilt-navigation-compose", version.ref = "hiltNavigation" }

kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }
kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "kotlinxDatetime" }

retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-kotlinx-serialization = { module = "com.squareup.retrofit2:converter-kotlinx-serialization", version.ref = "retrofit" }
retrofit-converter-scalars = { module = "com.squareup.retrofit2:converter-scalars", version.ref = "retrofit" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
okhttp-logging = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp" }

# Coil 3 — note the io.coil-kt.coil3 group (v2 was io.coil-kt).
coil-compose = { module = "io.coil-kt.coil3:coil-compose", version.ref = "coil" }
coil-network-okhttp = { module = "io.coil-kt.coil3:coil-network-okhttp", version.ref = "coil" }
coil-gif = { module = "io.coil-kt.coil3:coil-gif", version.ref = "coil" }

androidx-datastore-preferences = { module = "androidx.datastore:datastore-preferences", version.ref = "datastore" }
androidx-security-crypto = { module = "androidx.security:security-crypto-ktx", version.ref = "securityCrypto" }
# Partner-app expects the non-ktx variant; alias both for compatibility.
androidx-security-crypto-legacy = { module = "androidx.security:security-crypto", version.ref = "securityCrypto" }

mapbox-maps = { module = "com.mapbox.maps:android", version.ref = "mapbox" }
mapbox-compose = { module = "com.mapbox.extension:maps-compose", version.ref = "mapboxCompose" }
play-services-location = { module = "com.google.android.gms:play-services-location", version.ref = "playServicesLocation" }

junit = { module = "junit:junit", version = "4.13.2" }
androidx-junit = { module = "androidx.test.ext:junit", version.ref = "androidxJunit" }
androidx-espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espressoCore" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
turbine = { module = "app.cash.turbine:turbine", version.ref = "turbine" }

sentry-android = { module = "io.sentry:sentry-android", version.ref = "sentry" }
sentry-okhttp = { module = "io.sentry:sentry-android-okhttp", version.ref = "sentry" }
stripe-android = { module = "com.stripe:stripe-android", version.ref = "stripe" }

firebase-bom = { module = "com.google.firebase:firebase-bom", version.ref = "firebaseBom" }
firebase-messaging-ktx = { module = "com.google.firebase:firebase-messaging-ktx" }

androidx-credentials = { module = "androidx.credentials:credentials", version.ref = "credentials" }
androidx-credentials-play-services-auth = { module = "androidx.credentials:credentials-play-services-auth", version.ref = "credentials" }
googleid = { module = "com.google.android.libraries.identity.googleid:googleid", version.ref = "googleid" }

# Partner-only: Room, biometric, Lottie, desugaring
androidx-room-runtime = { module = "androidx.room:room-runtime", version.ref = "room" }
androidx-room-ktx = { module = "androidx.room:room-ktx", version.ref = "room" }
androidx-room-compiler = { module = "androidx.room:room-compiler", version.ref = "room" }
androidx-biometric = { module = "androidx.biometric:biometric", version.ref = "biometric" }
lottie-compose = { module = "com.airbnb.android:lottie-compose", version.ref = "lottie" }
desugar-jdk-libs = { module = "com.android.tools:desugar_jdk_libs", version.ref = "desugarJdkLibs" }
libphonenumber = { module = "com.googlecode.libphonenumber:libphonenumber", version.ref = "libphonenumber" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
# Two aliases for the Hilt plugin: customer uses `hilt`, partner uses `hilt-android`.
# Both resolve to the same plugin id; keeping both means neither app's build file
# needs to be touched.
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
openapi-generator = { id = "org.openapi.generator", version.ref = "openapiGenerator" }
google-services = { id = "com.google.gms.google-services", version.ref = "googleServices" }
