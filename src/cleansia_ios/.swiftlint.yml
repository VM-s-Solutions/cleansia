included:
  - CleansiaCore/Sources
  - CleansiaCore/Tests
  - CleansiaPartner/Sources
  - CleansiaCustomer/Sources

excluded:
  - "**/Generated"
  - "**/.build"
  - "**/DerivedData"

opt_in_rules:
  - empty_count
  - closure_spacing
  - redundant_nil_coalescing
  - redundant_type_annotation
  - explicit_init
  - first_where
  - contains_over_first_not_nil
  - sorted_first_last
  - toggle_bool
  - force_unwrapping

analyzer_rules:
  - unused_import

force_unwrapping:
  severity: error
force_cast:
  severity: error
force_try:
  severity: error

# SwiftFormat's `wrapMultilineStatementBraces` puts the opening brace of a
# multi-line condition on its own line; allow that so the two tools agree.
opening_brace:
  ignore_multiline_statement_conditions: true

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

# `swiftlint --strict` (CI) promotes WARNINGS to hard failures, so the warning
# tier IS the enforced cap. Set it to the error tier we actually want to block
# on (large test suites + composite SwiftUI views legitimately run long); the
# error tier stays higher as a hard ceiling.
file_length:
  warning: 600
  error: 800

type_body_length:
  warning: 400
  error: 500

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 15

identifier_name:
  excluded:
    - id
    - vm
    - to
    - s
    - m
    - l
    - ml
    - xs
    - xl
    - v   # CleanOrderAttributes.ContentState.v — the Live Activity content-state schema-version wire key ("v")

reporter: "xcode"
