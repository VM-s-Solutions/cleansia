name: CleansiaCustomer

options:
  bundleIdPrefix: cz.cleansia
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en
  - cs
  - sk
  - uk
  - ru

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Pins compile-time string extraction OFF so no build ever sync-rewrites the
    # hand-managed Localizable.xcstrings (stale-marking + junk auto-extracted keys).
    SWIFT_EMIT_LOC_STRINGS: NO

packages:
  CleansiaCore:
    path: ../CleansiaCore
  # Generated swift5 business client (machine-owned, gitignored). Regenerate via
  # scripts/generate-api-clients.sh after a mobile-spec refresh; never hand-edit.
  CleansiaCustomerApi:
    path: ../CleansiaCustomerApi
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios
    majorVersion: 25.0.0

targets:
  CleansiaCustomer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
      - path: PrivacyInfo.xcprivacy
      # Owner-local, gitignored FCM config. The folder is committed (empty); the
      # owner drops GoogleService-Info.plist here. Absent → no-plist build still
      # compiles and simply runs without push (see GoogleServicePlist gate).
      - path: Firebase
        optional: true
        excludes:
          - ".gitkeep"
    info:
      path: Info.plist
      properties:
        # Version + build wired to the target's MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION build settings (xcodegen would otherwise bake
        # literal "1.0"/"1"), so a release bump is a single settings change and
        # fastlane can override CURRENT_PROJECT_VERSION per TestFlight upload.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Standard HTTPS/Keychain only — exempt from export compliance, so every
        # TestFlight upload skips the encryption-usage question.
        ITSAppUsesNonExemptEncryption: false
        # Static launch screen — parity analogue of Android's system splash
        # background (Theme.Cleansia.Splash windowSplashScreenBackground, with
        # the values-night dark variant). Also opts the app into native
        # full-screen rendering (without it iOS letterboxes). Branded launch
        # storyboard (T-0426): full-bleed SplashBackground colour + the centered
        # "Cleansia" wordmark (LaunchScreen.storyboard), Auto-Layout-constrained
        # so it avoids the old UIImageName scaling bug that blew the image up
        # full-screen or dropped padded variants. The gradient + letter-by-letter
        # reveal continue in the in-app SplashGateView.
        UILaunchStoryboardName: LaunchScreen
        # Home-screen app name — show "Cleansia" rather than the PRODUCT_NAME ("CleansiaCustomer").
        CFBundleDisplayName: Cleansia
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # T-0403 debug: Firebase's app-delegate swizzling proxy is the only
        # foreign machinery between our registerForRemoteNotifications call and
        # UIKit, and the device syslog showed the registration generating ZERO
        # system traffic (no SpringBoard handling, no apsd token request). We
        # integrate Messaging manually anyway (we set Messaging.apnsToken in
        # didRegister..., own the MessagingDelegate + UNUserNotificationCenter
        # delegate, and pull the token explicitly), so the proxy is pure risk:
        # disable it per Firebase's own manual-integration guidance.
        FirebaseAppDelegateProxyEnabled: false
        API_BASE_URL: $(API_BASE_URL)
        GIDClientID: $(GID_CLIENT_ID)
        GIDServerClientID: $(GID_SERVER_CLIENT_ID)
        STRIPE_PUBLISHABLE_KEY: $(STRIPE_PUBLISHABLE_KEY)
        NSCameraUsageDescription: Cleansia uses the camera so you can attach photo evidence to a dispute.
        NSPhotoLibraryUsageDescription: Cleansia needs access to your photos so you can attach photo evidence to a dispute.
        NSLocationWhenInUseUsageDescription: Cleansia uses your location to center the map on your current position when you set your address.
        # ADR-0029 — opts the app into ActivityKit Live Activities (the CleansiaCustomerLiveActivity
        # widget extension renders the in-progress-clean status). Inert until the APNS channel is enabled.
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GID_REVERSED_CLIENT_ID)
        UIAppFonts:
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer
        PRODUCT_NAME: CleansiaCustomer
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: https:/$()/api-cleansia-customer-mobile-weu-dev.azurewebsites.net
        # T-0403: push (aps-environment) via CleansiaCustomer.entitlements so the FCM device token
        # registers. Sign in with Apple is intentionally NOT here yet — it re-lands with the full
        # flow + the App-ID capability in T-0344.
        CODE_SIGN_ENTITLEMENTS: CleansiaCustomer.entitlements
        # Owner-provisioned Google iOS OAuth client; empty until then →
        # graceful .notConfigured (no crash) and no Google button round-trip.
        GID_CLIENT_ID: "834394881207-4um0ikpfpavpl0usplaqpul413d8mvqq.apps.googleusercontent.com"
        GID_SERVER_CLIENT_ID: "834394881207-3r8mue033iimtrkn5u1ko9d5m5p7oh25.apps.googleusercontent.com"
        GID_REVERSED_CLIENT_ID: "com.googleusercontent.apps.834394881207-4um0ikpfpavpl0usplaqpul413d8mvqq"
        # Owner-provisioned Stripe publishable key (pk_ only — NEVER a secret
        # key). Empty until then → card payment is hidden and the cash path is
        # the only option; STPAPIClient is not initialised and PaymentSheet is
        # never presented (fail-closed).
        STRIPE_PUBLISHABLE_KEY: ""
    dependencies:
      - package: CleansiaCore
      - package: CleansiaCustomerApi
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: StripePaymentSheet
        product: StripePaymentSheet
      # Embeds the Live Activity widget extension into the app bundle (ADR-0029).
      - target: CleansiaCustomerLiveActivity

  CleansiaCustomerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CleansiaCustomer
      - package: CleansiaCore

  # ADR-0029 — the Live Activity widget extension (iOS 16.1+; the app floor stays 16.0). Renders the
  # in-progress-clean status on the lock screen + Dynamic Island. CleanOrderAttributes is shared with the
  # app target (compiled into both — the standard ActivityKit pattern; they are separate processes).
  CleansiaCustomerLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: LiveActivity
      - path: Sources/LiveActivityShared/CleanOrderAttributes.swift
    info:
      path: LiveActivity/Info.plist
      properties:
        # Must track the parent app exactly — Apple rejects an extension whose
        # CFBundleShortVersionString / CFBundleVersion differ from the host app.
        # Both inherit the same MARKETING_VERSION / CURRENT_PROJECT_VERSION.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Cleansia
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer.widgets
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
    dependencies:
      - package: CleansiaCore

schemes:
  CleansiaCustomer:
    build:
      targets:
        CleansiaCustomer: all
        CleansiaCustomerTests: [test]
    test:
      targets:
        - CleansiaCustomerTests
      gatherCoverageData: false
