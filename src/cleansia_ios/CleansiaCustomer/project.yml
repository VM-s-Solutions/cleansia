name: CleansiaCustomer

options:
  bundleIdPrefix: cz.cleansia
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  CleansiaCore:
    path: ../CleansiaCore
  # Generated swift5 business client (machine-owned, gitignored). Regenerate via
  # scripts/generate-api-clients.sh after a mobile-spec refresh; never hand-edit.
  CleansiaCustomerApi:
    path: ../CleansiaCustomerApi

targets:
  CleansiaCustomer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Info.plist
      properties:
        API_BASE_URL: $(API_BASE_URL)
        UIAppFonts:
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer
        PRODUCT_NAME: CleansiaCustomer
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: https:/$()/api-cleansia-customer-mobile-weu-dev.azurewebsites.net
    dependencies:
      - package: CleansiaCore
      - package: CleansiaCustomerApi
