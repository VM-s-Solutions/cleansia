name: CleansiaCustomer

options:
  bundleIdPrefix: cz.cleansia
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en
  - cs
  - sk
  - uk
  - ru

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Pins compile-time string extraction OFF so no build ever sync-rewrites the
    # hand-managed Localizable.xcstrings (stale-marking + junk auto-extracted keys).
    SWIFT_EMIT_LOC_STRINGS: NO

packages:
  CleansiaCore:
    path: ../CleansiaCore
  # Generated swift5 business client (machine-owned, gitignored). Regenerate via
  # scripts/generate-api-clients.sh after a mobile-spec refresh; never hand-edit.
  CleansiaCustomerApi:
    path: ../CleansiaCustomerApi
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios
    majorVersion: 25.0.0

targets:
  CleansiaCustomer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
      - path: PrivacyInfo.xcprivacy
    info:
      path: Info.plist
      properties:
        # Static launch screen — parity analogue of Android's system splash
        # background (Theme.Cleansia.Splash windowSplashScreenBackground, with
        # the values-night dark variant). Also opts the app into native
        # full-screen rendering (without it iOS letterboxes). Deliberately
        # color-only: on the iOS 16.4 simulator UIImageName either scales the
        # image to fill the screen (broken giant mascot) or silently renders
        # nothing for padded variants — the branded mascot splash lives in
        # SplashGateView instead.
        UILaunchScreen:
          UIColorName: SplashBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        API_BASE_URL: $(API_BASE_URL)
        GIDClientID: $(GID_CLIENT_ID)
        GIDServerClientID: $(GID_SERVER_CLIENT_ID)
        STRIPE_PUBLISHABLE_KEY: $(STRIPE_PUBLISHABLE_KEY)
        NSCameraUsageDescription: Cleansia uses the camera so you can attach photo evidence to a dispute.
        NSPhotoLibraryUsageDescription: Cleansia needs access to your photos so you can attach photo evidence to a dispute.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GID_REVERSED_CLIENT_ID)
        UIAppFonts:
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
    entitlements:
      path: CleansiaCustomer.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer
        PRODUCT_NAME: CleansiaCustomer
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: https:/$()/api-cleansia-customer-mobile-weu-dev.azurewebsites.net
        CODE_SIGN_ENTITLEMENTS: CleansiaCustomer.entitlements
        # Owner-provisioned Google iOS OAuth client; empty until then →
        # graceful .notConfigured (no crash) and no Google button round-trip.
        GID_CLIENT_ID: ""
        GID_SERVER_CLIENT_ID: ""
        GID_REVERSED_CLIENT_ID: ""
        # Owner-provisioned Stripe publishable key (pk_ only — NEVER a secret
        # key). Empty until then → card payment is hidden and the cash path is
        # the only option; STPAPIClient is not initialised and PaymentSheet is
        # never presented (fail-closed).
        STRIPE_PUBLISHABLE_KEY: ""
    dependencies:
      - package: CleansiaCore
      - package: CleansiaCustomerApi
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: StripePaymentSheet
        product: StripePaymentSheet

  CleansiaCustomerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.customer.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CleansiaCustomer
      - package: CleansiaCore

schemes:
  CleansiaCustomer:
    build:
      targets:
        CleansiaCustomer: all
        CleansiaCustomerTests: [test]
    test:
      targets:
        - CleansiaCustomerTests
      gatherCoverageData: false
