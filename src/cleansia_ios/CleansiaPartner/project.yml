name: CleansiaPartner

options:
  bundleIdPrefix: cz.cleansia
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en
  - cs
  - sk
  - uk
  - ru

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  CleansiaCore:
    path: ../CleansiaCore
  # Generated swift5 business client (machine-owned, gitignored). Regenerate via
  # scripts/generate-api-clients.sh after a mobile-spec refresh; never hand-edit.
  CleansiaPartnerApi:
    path: ../CleansiaPartnerApi

targets:
  CleansiaPartner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Info.plist
      properties:
        API_BASE_URL: $(API_BASE_URL)
        UIAppFonts:
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.partner
        PRODUCT_NAME: CleansiaPartner
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: https:/$()/api-cleansia-partner-mobile-weu-dev.azurewebsites.net
    dependencies:
      - package: CleansiaCore
      - package: CleansiaPartnerApi

  CleansiaPartnerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.partner.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CleansiaPartner
      - package: CleansiaCore

schemes:
  CleansiaPartner:
    build:
      targets:
        CleansiaPartner: all
        CleansiaPartnerTests: [test]
    test:
      targets:
        - CleansiaPartnerTests
      gatherCoverageData: false
