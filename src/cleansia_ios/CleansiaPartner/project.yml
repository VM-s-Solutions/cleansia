name: CleansiaPartner

options:
  bundleIdPrefix: cz.cleansia
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en
  - cs
  - sk
  - uk
  - ru

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  CleansiaCore:
    path: ../CleansiaCore
  # Generated swift5 business client (machine-owned, gitignored). Regenerate via
  # scripts/generate-api-clients.sh after a mobile-spec refresh; never hand-edit.
  CleansiaPartnerApi:
    path: ../CleansiaPartnerApi

targets:
  CleansiaPartner:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
      - path: PrivacyInfo.xcprivacy
    info:
      path: Info.plist
      properties:
        # Static launch screen — parity analogue of Android's system splash
        # background (Theme.Cleansia.Splash windowSplashScreenBackground, with
        # the values-night dark variant). Also opts the app into native
        # full-screen rendering (without it iOS letterboxes). Deliberately
        # color-only: on the iOS 16.4 simulator UIImageName either scales the
        # image to fill the screen (broken giant mascot) or silently renders
        # nothing for padded variants — the branded mascot splash lives in
        # SplashGateView instead.
        UILaunchScreen:
          UIColorName: SplashBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        API_BASE_URL: $(API_BASE_URL)
        NSCameraUsageDescription: Cleansia uses the camera to capture before and after photos of your cleaning jobs.
        NSPhotoLibraryUsageDescription: Cleansia needs access to your photos so you can attach before and after photos to your jobs.
        UIAppFonts:
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - Nunito-Regular.ttf
          - Nunito-SemiBold.ttf
          - Nunito-Bold.ttf
    entitlements:
      path: CleansiaPartner.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.partner
        PRODUCT_NAME: CleansiaPartner
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: https:/$()/api-cleansia-partner-mobile-weu-dev.azurewebsites.net
    dependencies:
      - package: CleansiaCore
      - package: CleansiaPartnerApi

  CleansiaPartnerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.cleansia.partner.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CleansiaPartner
      - package: CleansiaCore

schemes:
  CleansiaPartner:
    build:
      targets:
        CleansiaPartner: all
        CleansiaPartnerTests: [test]
    test:
      targets:
        - CleansiaPartnerTests
      gatherCoverageData: false
