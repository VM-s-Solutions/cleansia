generatorName: swift5
inputSpec: ../../cleansia_android/openapi/partner-mobile-api.json
outputDir: ../CleansiaPartnerApi
library: urlsession
generateAliasAsModel: false
enablePostProcessFile: false

additionalProperties:
  projectName: CleansiaPartnerApi
  swiftPackagePath: .
  podSource: SPM
  useSPMFileStructure: true
  responseAs: AsyncAwait
  useClasses: false
  hashableModels: true
  apiNamePrefix: Partner
  validatable: false
  # format:date fields (birthDate) must go on the wire as "yyyy-MM-dd" — the
  # currently deployed backend binds DateOnly strictly and 400s a full ISO
  # date-time (Android sends date-only; this restores wire parity).
  useCustomDateWithoutTime: true

globalProperties:
  apiTests: "false"
  apiDocs: "false"
  modelTests: "false"
  modelDocs: "false"
